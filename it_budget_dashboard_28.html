<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Budget Dashboard</title>
<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f3;
  --color-background-tertiary: #eeece8;
  --color-text-primary: #1a1a19;
  --color-text-secondary: #5f5e5a;
  --color-text-tertiary: #888780;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.22);
  --color-border-primary: rgba(0,0,0,0.32);
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --font-sans: system-ui, -apple-system, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-background-primary: #1e1e1c;
    --color-background-secondary: #2a2a28;
    --color-background-tertiary: #333330;
    --color-text-primary: #f0ede8;
    --color-text-secondary: #a8a69f;
    --color-text-tertiary: #6e6c67;
    --color-border-tertiary: rgba(255,255,255,0.10);
    --color-border-secondary: rgba(255,255,255,0.18);
    --color-border-primary: rgba(255,255,255,0.28);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary);padding:1.5rem}
h2{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:1rem}
.mx{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.mc{background:var(--color-background-secondary);border-radius:8px;padding:1rem}
.ml{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px}
.mv{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.ms{font-size:12px;margin-top:4px}
.gd{color:#0F6E56}.wa{color:#BA7517}.bd{color:#A32D2D}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;overflow-x:auto}
.tabs{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.tab{font-size:13px;padding:5px 14px;border-radius:8px;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.tab.on{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}
table{width:100%;font-size:13px;border-collapse:collapse}
th{text-align:left;font-weight:500;font-size:11px;color:var(--color-text-secondary);padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap}
td{padding:6px 8px;color:var(--color-text-primary);border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap}
.cr{background:var(--color-background-secondary)}
.cr td{font-weight:500}
.sr td:first-child{padding-left:28px;color:var(--color-text-secondary);font-weight:400}
.sr2 td:first-child{padding-left:48px;color:var(--color-text-tertiary);font-size:12px;font-weight:400}
tr.tr td{font-weight:500;border-top:1px solid var(--color-border-primary);border-bottom:none;background:var(--color-background-secondary)}
.tbtn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:11px;padding:0 3px}
.dbtn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:13px;padding:0 3px}
.dbtn:hover{color:#A32D2D}
.abtn{font-size:12px;padding:4px 10px;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;margin-top:10px;display:inline-block}
.abtn:hover{background:var(--color-background-secondary)}
.bw{background:var(--color-background-secondary);border-radius:4px;height:7px;overflow:hidden;width:70px;display:inline-block;vertical-align:middle}
.bi{height:100%;border-radius:4px}
input[type=number]{font-size:12px;width:90px;padding:2px 4px;border:0.5px solid var(--color-border-tertiary);border-radius:4px;background:var(--color-background-primary);color:var(--color-text-primary)}
input[type=text]{font-size:12px;padding:2px 5px;border:0.5px solid var(--color-border-tertiary);border-radius:4px;background:transparent;color:var(--color-text-primary)}
select{font-size:12px;padding:2px 4px;border-radius:4px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.badge{display:inline-block;font-size:11px;padding:2px 6px;border-radius:4px;font-weight:500}
.b-ok{background:#E1F5EE;color:#085041}
.b-bd{background:#FCEBEB;color:#791F1F}
.comp-header{background:var(--color-background-secondary);border-left:3px solid #5DCAA5}
.comp-header td{font-weight:500;font-size:13px}

.tbtn2{font-size:12px;padding:5px 10px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer}
.tbtn2:hover{background:var(--color-background-secondary)}

.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:var(--color-background-primary);border-radius:12px;padding:1.5rem;max-width:720px;width:100%;max-height:80vh;overflow-y:auto;border:0.5px solid var(--color-border-tertiary)}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-head h3{margin:0;font-size:16px;font-weight:500}
.close-btn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:18px;padding:0 6px}
.audit-row{padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.audit-row:last-child{border-bottom:none}
.audit-time{color:var(--color-text-secondary);font-size:11px}
.audit-change{color:var(--color-text-primary);margin-top:2px}
.audit-old{color:#A32D2D;text-decoration:line-through}
.audit-new{color:#0F6E56;font-weight:500}

input[type=number]:focus,input[type=text]:focus{outline:none;border-color:var(--color-border-primary);box-shadow:0 0 0 2px rgba(55,138,221,0.15)}

@media print{
  body{background:#fff !important;padding:0 !important}
  .no-print{display:none !important}
  .tabs{display:none !important}
  .card{border:1px solid #ccc !important;break-inside:avoid;page-break-inside:avoid;margin-bottom:1rem !important}
  #s-plan,#s-act,#s-comp,#s-proj,#s-fa,#s-scen,#s-rep{display:block !important;page-break-before:always}
  #s-plan{page-break-before:auto}
  .tbtn,.abtn,.dbtn,input[type=file],.print-hide,button.tbtn,button.abtn,button.dbtn{display:none !important}
  input[type=number],input[type=text]{border:none !important;background:transparent !important;padding:0 !important;font-weight:inherit;color:#000 !important}
  input[type=color]{display:none !important}
  table{font-size:11px !important}
  th{background:#eee !important;color:#000 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .cr{background:#f5f5f5 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  tr.tr td{background:#e8e8e8 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{margin:0.5in;size:landscape}
  h2::after{content:" — FY " attr(data-fy);font-weight:400;color:#555}
}
</style>
</head>
<body>
<div>
<div class="no-print" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <h2 style="margin:0">IT Budget Dashboard</h2>
    <div style="display:flex;align-items:center;gap:6px">
      <label style="font-size:12px;color:var(--color-text-secondary)">FY</label>
      <select id="fy-select" onchange="changeFY(this.value)" style="font-size:12px;padding:4px 8px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary)"></select>
      <button onclick="addFY()" class="tbtn2" title="Add new fiscal year">+ Year</button>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <input type="search" id="search-input" placeholder="Search…" oninput="searchQuery=this.value.toLowerCase();ra()" style="font-size:12px;padding:5px 10px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary);width:140px" />
    <span id="save-status" style="font-size:12px;color:var(--color-text-secondary)"></span>
    <button onclick="exportData()" class="tbtn2">Export JSON</button>
    <button onclick="exportCSV()" class="tbtn2">Export CSV</button>
    <label class="tbtn2" style="cursor:pointer">
      Import JSON<input type="file" accept=".json" onchange="importData(event)" style="display:none">
    </label>
    <label class="tbtn2" style="cursor:pointer">
      Import CSV<input type="file" accept=".csv,.txt" onchange="importCSV(event)" style="display:none">
    </label>
    <button onclick="showAuditLog()" class="tbtn2">History</button>
    <button onclick="showSyncMenu()" class="tbtn2" title="Sync to GitHub Gist">☁</button>
    <button onclick="showSettings()" class="tbtn2" title="Settings">⚙</button>
    <button onclick="printReport()" class="tbtn2">Print</button>
    <button onclick="securityMenu()" class="tbtn2" title="Passphrase & lock options">🔒</button>
    <button onclick="resetData()" class="tbtn2" style="color:var(--color-text-secondary)">Reset</button>
  </div>
</div>
<div class="mx" id="mx"></div>
<div class="tabs">
  <button class="tab on" onclick="showTab('plan')">Budget planner</button>
  <button class="tab" onclick="showTab('act')">Budget vs. actuals</button>
  <button class="tab" onclick="showTab('comp')">Compensation</button>
  <button class="tab" onclick="showTab('proj')">Project estimator</button>
  <button class="tab" onclick="showTab('fa')">FA 190</button>
  <button class="tab" onclick="showTab('scen')">Scenarios</button>
  <button class="tab" onclick="showTab('rep')">Reports</button>
</div>
<div id="s-plan"></div>
<div id="s-act" style="display:none"></div>
<div id="s-comp" style="display:none"></div>
<div id="s-proj" style="display:none"></div>
<div id="s-fa" style="display:none"></div>
<div id="s-scen" style="display:none"></div>
<div id="s-rep" style="display:none"></div>
</div>

// Search/filter state
let searchQuery = '';
function matchesSearch(text) {
  if (!searchQuery) return true;
  return String(text || '').toLowerCase().includes(searchQuery);
}
function catMatches(cat) {
  if (!searchQuery) return true;
  if (matchesSearch(cat.n)) return true;
  return cat.subs.some(sub => subMatches(sub));
}
function subMatches(sub) {
  if (!searchQuery) return true;
  if (matchesSearch(sub.n)) return true;
  return sub.items.some(it => matchesSearch(it.n));
}
function deptMatches(dept) {
  if (!searchQuery) return true;
  if (matchesSearch(dept.n)) return true;
  return dept.employees.some(e => matchesSearch(e.n) || matchesSearch(e.title) || e.items.some(i => matchesSearch(i.n)));
}
function projMatches(proj) {
  if (!searchQuery) return true;
  if (matchesSearch(proj.n)) return true;
  return proj.items.some(i => matchesSearch(i.n));
}

// FA 190 keyword suggestion engine (#2)
const FA190_KEYWORDS = [
  { fa: 'Equipment', kw: ['laptop','dell','server','hardware','peripheral','monitor','device','wifi','router','switch','firewall appliance','ups','storage','san','nas','colocation','disaster recovery','dr platform','backup'] },
  { fa: 'Support and Other Services', kw: ['license','licensing','subscription','saas','aws','azure','google workspace','snowflake','cloudflare','salesforce','workday','servicenow','microsoft 365','m365','office 365','adobe','crowdstrike','okta','qualys','zoom','mpls','wireless','internet','circuit','sd-wan','cdn'] },
  { fa: 'Professional and Consulting', kw: ['consulting','consultant','contract','contractor','professional services','implementation','sap consulting','architect (contract)','pmo'] },
  { fa: 'Compensation', kw: ['salary','staff','help desk staff','field technicians','technician','engineer fte'] },
  { fa: 'Conferences and Meetings', kw: ['conference','training','workshop','event','meeting','travel','seminar','offsite'] },
  { fa: 'Personnel Expenses', kw: ['recruiting','recruitment','onboarding','relocation','reimbursement'] },
  { fa: 'Depreciation', kw: ['depreciation','amortization'] }
];
function suggestFA190(itemName) {
  const n = String(itemName || '').toLowerCase();
  for (const { fa, kw } of FA190_KEYWORDS) {
    if (kw.some(k => n.includes(k))) return fa;
  }
  return null;
}

function mx(){
  const tb=gB(),ta=gA(),tv=tb-ta;
  const cb=compTotalB(),ca=compTotalA();
  const grandB=tb+cb,grandA=ta+ca;
  $('mx').innerHTML=[
    {l:'Total IT budget',v:fk(tb),s:'OpEx excl. compensation',c:''},
    {l:'Total compensation',v:fk(cb),s:fk(ca)+' actual',c:''},
    {l:'Grand total budget',v:fk(grandB),s:fk(grandA)+' actual',c:''},
    {l:'OpEx variance',v:(tv<0?'-':'')+fk(Math.abs(tv)),s:tv>=0?'Under budget':'Over budget',c:tv>=0?'gd':'bd'}
  ].map(m=>`<div class="mc"><div class="ml">${m.l}</div><div class="mv">${m.v}</div><div class="ms ${m.c}">${m.s}</div></div>`).join('');

function setProjLink(pi, ii, val) {
  const it = projs[pi].items[ii];
  if (!val) {
    if (it.linkedTo) {
      logAudit('project_link', `Unlinked "${projs[pi].n} › ${it.n}"`);
      delete it.linkedTo;
    }
  } else {
    const [ci, si] = val.split('.').map(Number);
    if (!cats[ci] || !cats[ci].subs[si]) return;
    it.linkedTo = { ci, si };
    logAudit('project_link', `Linked "${projs[pi].n} › ${it.n}" → "${cats[ci].n} › ${cats[ci].subs[si].n}"`);
  }
  ra();
}

// Lookup: find all project items linked to a given subcategory
function projectLinksForSub(ci, si) {
  const links = [];
  projs.forEach((p, pi) => {
    p.items.forEach((it, ii) => {
      if (it.linkedTo && it.linkedTo.ci === ci && it.linkedTo.si === si) {
        links.push({ proj: p.n, item: it.n, budget: it.b, actual: it.a || 0 });
      }
    });
  });
  return links;
}

// ============ FA 190 Rollup ============
function compTypeToFA190(type) {
  if (type === 'Benefits') return 'Employee Benefits';
  if (type === 'Salary' || type === 'Bonus' || type === 'Equity') return 'Compensation';
  return null;
}

// Lightweight year-aware FA 190 budget rollup used by the year comparison report.
// Returns { byCategory: { faName: budget }, unassigned: budget } for whatever year is passed in.
function buildFA190BudgetForYear(year) {
  const result = { byCategory: {}, unassigned: 0 };
  FA190_CATEGORIES.forEach(c => { result.byCategory[c] = 0; });

  // For the current year, use live in-memory arrays so unsaved edits are reflected.
  // For other years, read from the stored fyStore.
  let yearCats, yearComp;
  if (year === fyStore.currentFY) {
    yearCats = cats;
    yearComp = compDepts;
  } else {
    const yearData = fyStore.years[year];
    if (!yearData) return result;
    yearCats = yearData.cats || [];
    yearComp = yearData.compDepts || [];
  }

  yearCats.forEach(cat => {
    cat.subs.forEach(sub => {
      sub.items.forEach(it => {
        let tags = null;
        if (Array.isArray(it.fa190Splits) && it.fa190Splits.length > 0) {
          tags = it.fa190Splits.filter(s => FA190_CATEGORIES.includes(s.fa) && s.pct > 0);
        } else if (it.fa190 && FA190_CATEGORIES.includes(it.fa190)) {
          tags = [{ fa: it.fa190, pct: 100 }];
        }
        if (!tags || tags.length === 0) {
          result.unassigned += it.b;
          return;
        }
        tags.forEach(({ fa, pct }) => {
          if (FA190_CATEGORIES.includes(fa)) result.byCategory[fa] += it.b * (pct / 100);
        });
      });
    });
  });

  yearComp.forEach(dept => {
    dept.employees.forEach(emp => {
      emp.items.forEach(item => {
        const tag = compTypeToFA190(item.type);
        if (!tag) { result.unassigned += item.b; return; }
        result.byCategory[tag] += item.b;
      });
    });
  });

  return result;
}

function buildFA190Rollup() {
  const fmth = (typeof getEffectiveForecastMonth === 'function') ? getEffectiveForecastMonth() : 12;
  const rollup = {};
  FA190_CATEGORIES.forEach(c => { rollup[c] = { budget: 0, actual: 0, reforecast: 0, priorBudget: 0, lineCount: 0, sources: [] }; });
  const unassigned = [];
  const priorExists = !!fyStore.years[priorYearKey()];

  function applyToRollup(tags, srcInfo) {
    // tags is array of { fa, pct } summing to ~100
    tags.forEach(({ fa, pct }) => {
      if (!FA190_CATEGORIES.includes(fa)) return;
      const frac = pct / 100;
      rollup[fa].budget += srcInfo.budget * frac;
      rollup[fa].actual += srcInfo.actual * frac;
      rollup[fa].reforecast += srcInfo.reforecast * frac;
      rollup[fa].priorBudget += srcInfo.priorBudget * frac;
      rollup[fa].lineCount++;
      rollup[fa].sources.push({
        ...srcInfo,
        budget: srcInfo.budget * frac,
        actual: srcInfo.actual * frac,
        reforecast: srcInfo.reforecast * frac,
        priorBudget: srcInfo.priorBudget * frac,
        splitPct: pct,
        isSplit: tags.length > 1
      });
    });
  }

  cats.forEach(cat => {
    cat.subs.forEach(sub => {
      sub.items.forEach(it => {
        const pb = priorExists ? priorYearItemBudget(it.n, sub.n, cat.n) : null;
        const reforecast = (typeof getReforecast === 'function') ? getReforecast(it, fmth) : it.b;
        const srcInfo = {
          source: 'Budget planner',
          path: `${cat.n} › ${sub.n} › ${it.n}`,
          budget: it.b, actual: it.a || 0,
          reforecast,
          explicitReforecast: (typeof hasExplicitReforecast === 'function') ? hasExplicitReforecast(it) : false,
          priorBudget: pb || 0
        };
        // Determine tags
        let tags = null;
        if (Array.isArray(it.fa190Splits) && it.fa190Splits.length > 0) {
          tags = it.fa190Splits.filter(s => FA190_CATEGORIES.includes(s.fa) && s.pct > 0);
        } else if (it.fa190 && FA190_CATEGORIES.includes(it.fa190)) {
          tags = [{ fa: it.fa190, pct: 100 }];
        }
        if (!tags || tags.length === 0) {
          unassigned.push(srcInfo);
          return;
        }
        applyToRollup(tags, srcInfo);
      });
    });
  });

  compDepts.forEach(dept => {
    dept.employees.forEach(emp => {
      emp.items.forEach(item => {
        const tag = compTypeToFA190(item.type);
        let priorVal = 0;
        if (priorExists) {
          const prior = fyStore.years[priorYearKey()];
          const priorDept = prior.compDepts?.find(d => d.n === dept.n);
          const priorEmp = priorDept?.employees.find(e => e.n === emp.n);
          const priorItem = priorEmp?.items.find(i => i.n === item.n);
          if (priorItem) priorVal = priorItem.b || 0;
        }
        const reforecast = (typeof getReforecast === 'function') ? getReforecast(item, fmth) : item.b;
        const srcInfo = {
          source: 'Compensation',
          path: `${dept.n} › ${emp.n} › ${item.n}`,
          budget: item.b, actual: item.a || 0,
          reforecast,
          explicitReforecast: (typeof hasExplicitReforecast === 'function') ? hasExplicitReforecast(item) : false,
          priorBudget: priorVal
        };
        if (!tag) {
          unassigned.push({...srcInfo, path: srcInfo.path + ` (${item.type || 'Other'})`});
          return;
        }
        applyToRollup([{ fa: tag, pct: 100 }], srcInfo);
      });
    });
  });

  return { byCategory: rollup, unassigned, priorExists };
}

function rFA190() {
  const { byCategory, unassigned, priorExists } = buildFA190Rollup();
  const totalB = FA190_CATEGORIES.reduce((s, c) => s + byCategory[c].budget, 0);
  const totalA = FA190_CATEGORIES.reduce((s, c) => s + byCategory[c].actual, 0);
  const totalR = FA190_CATEGORIES.reduce((s, c) => s + byCategory[c].reforecast, 0);
  const totalPB = FA190_CATEGORIES.reduce((s, c) => s + byCategory[c].priorBudget, 0);
  const unassignedB = unassigned.reduce((s, u) => s + u.budget, 0);
  const unassignedA = unassigned.reduce((s, u) => s + u.actual, 0);
  const totalReforecastVar = totalB - totalR;

  let html = `<div class="card">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">

  html += `<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem">

    <div class="mc"><div class="ml">Reforecast (FY-end)</div><div class="mv">${fk(totalR)}</div><div class="ms" style="color:${totalReforecastVar===0?'var(--color-text-secondary)':totalReforecastVar>0?'#0F6E56':'#A32D2D'}">${totalReforecastVar===0?'= Budget':totalReforecastVar>0?'+':''}${totalReforecastVar===0?'':fk(totalReforecastVar)+' vs budget'}</div></div>

  </div>`;

  // Horizontal bar chart (Budget vs Actual only — chart stays focused; reforecast is in the table)
  const usedCats = FA190_CATEGORIES.filter(c => byCategory[c].lineCount > 0);
  if (usedCats.length > 0) {
    html += `<div style="display:flex;justify-content:flex-end;margin-bottom:8px">
      <button class="tbtn2" onclick="toggleFA190Chart()" style="font-size:11px;padding:3px 10px">${fa190ChartHidden ? 'Show chart' : 'Hide chart'}</button>
    </div>`;
    if (!fa190ChartHidden) {
      const chartHeight = Math.max(usedCats.length * 38 + 60, 220);
      html += `<div style="position:relative;width:100%;height:${chartHeight}px;margin-bottom:1.5rem">
        <canvas id="fa190Chart" role="img" aria-label="Horizontal bar chart of FA 190 categories"></canvas>
      </div>`;
    }
  }

  html += `<table><thead><tr>
    <th style="width:26%">FA 190 Category</th>
    <th style="text-align:right">Budget</th>
    <th style="text-align:right">Actual</th>
    <th style="text-align:right" title="Reforecast — sum of explicit overrides plus budget defaults">Reforecast</th>
    <th style="text-align:right" title="Budget − Reforecast (positive = under budget at FY-end)">Variance</th>
    ${priorExists ? `<th style="text-align:right">FY ${priorYearKey()} Budget</th><th style="text-align:right">YoY</th>` : ''}
    <th style="text-align:right">% of total</th>
    <th style="text-align:right">Lines</th>
    <th>Utilization</th>
  </tr></thead><tbody>`;

  FA190_CATEGORIES.forEach(faName => {
    const row = byCategory[faName];
    const variance = row.budget - row.reforecast;
    const pct = totalB > 0 ? (row.budget / totalB * 100) : 0;
    const yoy = (priorExists && row.priorBudget > 0) ? ((row.budget - row.priorBudget) / row.priorBudget * 100) : null;
    const color = FA190_COLORS[faName];
    const key = 'fa-' + faName.replace(/\s/g,'_');

      <td style="text-align:right;color:var(--color-text-secondary)">${row.lineCount>0?pct.toFixed(1)+'%':'—'}</td>
      <td style="text-align:right;color:var(--color-text-secondary);font-size:12px">${row.lineCount}</td>
      <td>${row.lineCount>0?bar(row.budget,row.actual):''}</td>
    </tr>`;

    if (expanded && row.sources.length > 0) {
      row.sources.forEach(src => {

// ============ Scenarios ============
// Scenarios are saved per fiscal year. Each year has a `scenarios` array.
// Each scenario: { id, name, adjustments: [...], created }
// Each adjustment: { id, enabled, scope, scopeRef, method, value, label }
//   scope: 'all' | 'category' | 'subcategory' | 'line_item' | 'fa190' | 'comp_all' | 'comp_dept' | 'comp_employee' | 'projects_all' | 'project'
//   method: 'percent' | 'dollar' | 'set'
//   value: number (percent as 5 = +5%, -10 = -10%; dollar as positive/negative; set as the new total)

let activeScenarioId = null; // null = base / no scenario

function ensureScenariosArray() {
  // Ensure current FY has a scenarios array (migrate if missing)
  if (!Array.isArray(fyStore.years[fyStore.currentFY].scenarios)) {
    fyStore.years[fyStore.currentFY].scenarios = [];
  }
}

function getCurrentScenarios() {
  ensureScenariosArray();
  return fyStore.years[fyStore.currentFY].scenarios;
}

function getActiveScenario() {
  if (!activeScenarioId) return null;
  return getCurrentScenarios().find(s => s.id === activeScenarioId) || null;
}

function newScenarioId() {
  return 'sc_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7);
}

// Apply a single adjustment to a deep-cloned working set { cats, compDepts, projs }
// Returns the working set with values modified.
function applyAdjustment(working, adj) {
  if (!adj.enabled) return working;
  const m = adj.method, v = adj.value || 0;

  function tweak(currentBudget) {
    if (m === 'percent') return Math.round(currentBudget * (1 + v / 100));
    if (m === 'dollar') return Math.max(0, Math.round(currentBudget + v));
    if (m === 'set') return Math.max(0, Math.round(v));
    return currentBudget;
  }

  // Iterate based on scope
  if (adj.scope === 'all') {
    working.cats.forEach(c => c.subs.forEach(s => s.items.forEach(i => i.b = tweak(i.b))));
    working.compDepts.forEach(d => d.employees.forEach(e => e.items.forEach(i => i.b = tweak(i.b))));
    return working;
  }

  if (adj.scope === 'category') {
    const ci = adj.scopeRef?.ci;
    if (working.cats[ci]) {
      working.cats[ci].subs.forEach(s => s.items.forEach(i => i.b = tweak(i.b)));
    }
    return working;
  }

  if (adj.scope === 'subcategory') {
    const { ci, si } = adj.scopeRef || {};
    if (working.cats[ci]?.subs[si]) {
      working.cats[ci].subs[si].items.forEach(i => i.b = tweak(i.b));
    }
    return working;
  }

  if (adj.scope === 'line_item') {
    const { ci, si, ii } = adj.scopeRef || {};
    if (working.cats[ci]?.subs[si]?.items[ii]) {
      working.cats[ci].subs[si].items[ii].b = tweak(working.cats[ci].subs[si].items[ii].b);
    }
    return working;
  }

  if (adj.scope === 'fa190') {
    const fa = adj.scopeRef?.fa;
    if (!fa) return working;
    // Apply to all line items tagged with this FA 190 category (including splits)
    working.cats.forEach(c => c.subs.forEach(s => s.items.forEach(i => {
      let matches = false;
      if (Array.isArray(i.fa190Splits)) {
        matches = i.fa190Splits.some(sp => sp.fa === fa && sp.pct > 0);
      } else if (i.fa190 === fa) {
        matches = true;
      }
      if (matches) i.b = tweak(i.b);
    })));
    // Also apply to compensation items that auto-map to this FA 190 category
    if (fa === 'Compensation') {
      working.compDepts.forEach(d => d.employees.forEach(e => e.items.forEach(i => {
        if (i.type === 'Salary' || i.type === 'Bonus' || i.type === 'Equity') i.b = tweak(i.b);
      })));
    } else if (fa === 'Employee Benefits') {
      working.compDepts.forEach(d => d.employees.forEach(e => e.items.forEach(i => {
        if (i.type === 'Benefits') i.b = tweak(i.b);
      })));
    }
    return working;
  }

  if (adj.scope === 'comp_all') {
    working.compDepts.forEach(d => d.employees.forEach(e => e.items.forEach(i => i.b = tweak(i.b))));
    return working;
  }

  if (adj.scope === 'comp_dept') {
    const { di } = adj.scopeRef || {};
    if (working.compDepts[di]) {
      working.compDepts[di].employees.forEach(e => e.items.forEach(i => i.b = tweak(i.b)));
    }
    return working;
  }

  if (adj.scope === 'comp_employee') {
    const { di, ei } = adj.scopeRef || {};
    if (working.compDepts[di]?.employees[ei]) {
      working.compDepts[di].employees[ei].items.forEach(i => i.b = tweak(i.b));
    }
    return working;
  }

  if (adj.scope === 'projects_all') {
    working.projs.forEach(p => p.items.forEach(i => i.b = tweak(i.b)));
    return working;
  }

  if (adj.scope === 'project') {
    const { pi } = adj.scopeRef || {};
    if (working.projs[pi]) {
      working.projs[pi].items.forEach(i => i.b = tweak(i.b));
    }
    return working;
  }

  return working;
}

// Apply all adjustments in a scenario to a deep-cloned base. Returns the modified working set.
function applyScenario(scenario, baseCats, baseComp, baseProjs) {
  const working = {
    cats: JSON.parse(JSON.stringify(baseCats || cats)),
    compDepts: JSON.parse(JSON.stringify(baseComp || compDepts)),
    projs: JSON.parse(JSON.stringify(baseProjs || projs))
  };
  if (!scenario || !Array.isArray(scenario.adjustments)) return working;
  scenario.adjustments.forEach(adj => applyAdjustment(working, adj));
  return working;
}

// Compute totals from a working set
function totalsFor(working) {
  const planB = working.cats.reduce((s, c) => s + c.subs.reduce((ss, sub) => ss + sub.items.reduce((sss, i) => sss + (i.b || 0), 0), 0), 0);
  const compB = working.compDepts.reduce((s, d) => s + d.employees.reduce((ss, e) => ss + e.items.reduce((sss, i) => sss + (i.b || 0), 0), 0), 0);
  const projB = working.projs.reduce((s, p) => s + p.items.reduce((ss, i) => ss + (i.b || 0), 0), 0);
  return { planB, compB, projB, total: planB + compB };
}

function fa190TotalsFor(working) {
  // Lightweight FA 190 budget rollup for a working set
  const result = {};
  FA190_CATEGORIES.forEach(c => result[c] = 0);
  working.cats.forEach(cat => cat.subs.forEach(sub => sub.items.forEach(it => {
    let tags = null;
    if (Array.isArray(it.fa190Splits) && it.fa190Splits.length > 0) {
      tags = it.fa190Splits.filter(s => FA190_CATEGORIES.includes(s.fa) && s.pct > 0);
    } else if (it.fa190 && FA190_CATEGORIES.includes(it.fa190)) {
      tags = [{ fa: it.fa190, pct: 100 }];
    }
    if (!tags) return;
    tags.forEach(({ fa, pct }) => { result[fa] += (it.b || 0) * (pct / 100); });
  })));
  working.compDepts.forEach(d => d.employees.forEach(e => e.items.forEach(item => {
    const tag = compTypeToFA190(item.type);
    if (tag) result[tag] += item.b || 0;
  })));
  return result;
}

    <td style="text-align:right;color:${compDelta>=0?'#A32D2D':'#0F6E56'};font-size:12px">${compDelta===0?'—':(compPct>=0?'+':'')+compPct.toFixed(1)+'%'}</td>
  </tr>`;

  html += `<tr style="border-top:1px solid var(--color-border-primary);font-weight:500;background:var(--color-background-secondary)">
    <td>Total (OpEx + Comp)</td>
    <td style="text-align:right">${fm(baseTotals.total)}</td>
    <td style="text-align:right">${fm(scenTotals.total)}</td>
    <td style="text-align:right;color:${totalDelta>=0?'#A32D2D':'#0F6E56'}">${totalDelta>=0?'+':'-'}${fm(Math.abs(totalDelta))}</td>
    <td style="text-align:right;color:${totalDelta>=0?'#A32D2D':'#0F6E56'}">${totalDelta===0?'—':(totalDeltaPct>=0?'+':'')+totalDeltaPct.toFixed(1)+'%'}</td>
  </tr>`;
  html += `</tbody></table>`;

  // FA 190 side-by-side comparison
  const baseFA = fa190TotalsFor(base);
  const scenFA = fa190TotalsFor(working);
  const baseFATotal = FA190_CATEGORIES.reduce((s, c) => s + baseFA[c], 0);
  const scenFATotal = FA190_CATEGORIES.reduce((s, c) => s + scenFA[c], 0);
  const faTotalDelta = scenFATotal - baseFATotal;
  const faTotalPct = baseFATotal > 0 ? (faTotalDelta / baseFATotal * 100) : 0;

  html += `<h4 style="margin:1.5rem 0 0.5rem;font-size:14px;font-weight:500">FA 190 category comparison</h4>
  <p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 12px">Shows how this scenario shifts the FA 190 rollup. Includes both manually-tagged Budget planner items and auto-mapped Compensation items. The "Mix shift" column shows how each category's share of total FA 190 budget changes in percentage points.</p>
  <table><thead><tr>
    <th style="text-align:left">FA 190 Category</th>
    <th style="text-align:right">Base budget</th>
    <th style="text-align:right">Scenario budget</th>
    <th style="text-align:right">Delta</th>
    <th style="text-align:right">%</th>
    <th style="text-align:right">Mix shift</th>
  </tr></thead><tbody>`;

  // Use canonical FA 190 order to match the FA 190 tab
  FA190_CATEGORIES.forEach(faName => {
    const bv = baseFA[faName];
    const sv = scenFA[faName];
    if (bv === 0 && sv === 0) return; // hide rows that are zero in both
    const delta = sv - bv;
    const dpct = bv > 0 ? (delta / bv * 100) : null;
    const baseMix = baseFATotal > 0 ? (bv / baseFATotal * 100) : 0;
    const scenMix = scenFATotal > 0 ? (sv / scenFATotal * 100) : 0;
    const mixShift = scenMix - baseMix;
    const deltaColor = delta === 0 ? 'var(--color-text-primary)' : delta > 0 ? '#A32D2D' : '#0F6E56';
    const mixColor = mixShift >= 0.05 ? '#185FA5' : mixShift <= -0.05 ? '#888780' : 'var(--color-text-secondary)';
    html += `<tr>
      <td><span class="dot" style="background:${FA190_COLORS[faName]}"></span>${faName}</td>
      <td style="text-align:right">${bv > 0 ? fm(bv) : '—'}</td>
      <td style="text-align:right;font-weight:${delta!==0?'500':'normal'}">${sv > 0 ? fm(sv) : '—'}</td>
      <td style="text-align:right;color:${deltaColor};font-weight:${delta!==0?'500':'normal'}">${delta === 0 ? '—' : (delta > 0 ? '+' : '-') + fm(Math.abs(delta))}</td>
      <td style="text-align:right;color:${deltaColor};font-size:12px">${dpct === null ? (sv > 0 ? '<em style="color:var(--color-text-tertiary);font-style:normal">new</em>' : '—') : (delta === 0 ? '—' : (dpct >= 0 ? '+' : '') + dpct.toFixed(1) + '%')}</td>
      <td style="text-align:right;font-size:12px;color:${mixColor}">${Math.abs(mixShift) < 0.05 ? '—' : (mixShift >= 0 ? '+' : '') + mixShift.toFixed(1) + ' pts'}</td>
    </tr>`;
  });

  html += `<tr style="border-top:1px solid var(--color-border-primary);font-weight:500;background:var(--color-background-secondary)">
    <td>FA 190 Total</td>
    <td style="text-align:right">${fm(baseFATotal)}</td>
    <td style="text-align:right">${fm(scenFATotal)}</td>
    <td style="text-align:right;color:${faTotalDelta>=0?'#A32D2D':'#0F6E56'}">${faTotalDelta === 0 ? '—' : (faTotalDelta > 0 ? '+' : '-') + fm(Math.abs(faTotalDelta))}</td>
    <td style="text-align:right;color:${faTotalDelta>=0?'#A32D2D':'#0F6E56'}">${faTotalDelta === 0 ? '—' : (faTotalPct >= 0 ? '+' : '') + faTotalPct.toFixed(1) + '%'}</td>
    <td style="text-align:right;font-size:12px;color:var(--color-text-secondary)">—</td>
  </tr>`;
  html += `</tbody></table>`;

  // Note about untagged items if there's a gap between OpEx total and FA 190 total
  const baseOpEx = baseTotals.planB + baseTotals.compB;
  const baseUntagged = baseOpEx - baseFATotal;
  if (baseUntagged > 1) {
    html += `<p style="font-size:11px;color:var(--color-text-tertiary);margin:8px 0 0;font-style:italic">Note: ${fm(baseUntagged)} of base budget is not tagged with an FA 190 category and is not reflected in the table above. Tag the missing items in the Budget planner if you want them included.</p>`;
  }

  // Action buttons
  html += `<h4 style="margin:1.5rem 0 0.5rem;font-size:14px;font-weight:500">Actions</h4>
  <p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 12px">When you are happy with the scenario, you can apply it to your data or export it. Applying overwrites budget values; consider keeping a JSON backup first.</p>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="abtn" onclick="applyScenarioTo('current')" style="background:#BA7517">⚠ Apply to current FY (overwrites budgets)</button>
    <button class="abtn" onclick="applyScenarioTo('new')">→ Apply to new FY</button>
    <button class="tbtn2" onclick="exportScenarioJSON('${active.id}')">Export scenario as JSON</button>
  </div>
  </div>`;

  $('s-scen').innerHTML = html;

  // Populate the target dropdown based on default scope
  setTimeout(populateTargetDropdown, 0);
}

function populateTargetDropdown() {
  const scopeEl = document.getElementById('adj-scope');
  const targetEl = document.getElementById('adj-target');
  if (!scopeEl || !targetEl) return;
  const scope = scopeEl.value;
  let opts = [];

  if (scope === 'category') {
    opts = cats.map((c, ci) => ({ value: 'ci=' + ci, label: c.n }));
  } else if (scope === 'subcategory') {
    cats.forEach((c, ci) => c.subs.forEach((s, si) => opts.push({ value: 'ci=' + ci + ',si=' + si, label: c.n + ' › ' + s.n })));
  } else if (scope === 'line_item') {
    cats.forEach((c, ci) => c.subs.forEach((s, si) => s.items.forEach((it, ii) => opts.push({ value: 'ci=' + ci + ',si=' + si + ',ii=' + ii, label: c.n + ' › ' + s.n + ' › ' + it.n }))));
  } else if (scope === 'fa190') {
    opts = FA190_CATEGORIES.map(f => ({ value: 'fa=' + f, label: f }));
  } else if (scope === 'comp_dept') {
    opts = compDepts.map((d, di) => ({ value: 'di=' + di, label: d.n }));
  } else if (scope === 'comp_employee') {
    compDepts.forEach((d, di) => d.employees.forEach((e, ei) => opts.push({ value: 'di=' + di + ',ei=' + ei, label: d.n + ' › ' + e.n })));
  } else if (scope === 'project') {
    opts = projs.map((p, pi) => ({ value: 'pi=' + pi, label: p.n }));
  }

  if (opts.length > 0) {
    targetEl.innerHTML = opts.map(o => `<option value="${o.value}">${o.label}</option>`).join('');
    targetEl.disabled = false;
  } else {
    targetEl.innerHTML = '<option value="">(N/A — applies to all in scope)</option>';
    targetEl.disabled = true;
  }
}

function onAdjScopeChange() {
  populateTargetDropdown();
}

// Parse target value back into scopeRef
function parseTargetRef(scope, targetVal) {
  if (!targetVal) return {};
  const ref = {};
  targetVal.split(',').forEach(part => {
    const [k, v] = part.split('=');
    if (k === 'fa') ref.fa = v;
    else ref[k] = parseInt(v, 10);
  });
  return ref;
}

function setActiveScenario(id) {
  activeScenarioId = id || null;
  rScenarios();
}

function newScenario() {
  const name = prompt('Name for the new scenario:', 'Scenario ' + (getCurrentScenarios().length + 1));
  if (!name) return;
  ensureScenariosArray();
  const sc = { id: newScenarioId(), name: name.trim(), adjustments: [], created: new Date().toISOString() };
  fyStore.years[fyStore.currentFY].scenarios.push(sc);
  activeScenarioId = sc.id;
  logAudit('scenario', `Created scenario "${sc.name}" in FY ${fyStore.currentFY}`);
  saveToStorage();
  rScenarios();
}

function renameScenario(id) {
  const sc = getCurrentScenarios().find(s => s.id === id);
  if (!sc) return;
  const name = prompt('New name:', sc.name);
  if (!name) return;
  sc.name = name.trim();
  logAudit('scenario', `Renamed scenario to "${sc.name}"`);
  saveToStorage();
  rScenarios();
}

function duplicateScenario(id) {
  const sc = getCurrentScenarios().find(s => s.id === id);
  if (!sc) return;
  const copy = JSON.parse(JSON.stringify(sc));
  copy.id = newScenarioId();
  copy.name = sc.name + ' (copy)';
  copy.created = new Date().toISOString();
  // Generate new adjustment IDs
  copy.adjustments.forEach(a => a.id = 'adj_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,5));
  fyStore.years[fyStore.currentFY].scenarios.push(copy);
  activeScenarioId = copy.id;
  logAudit('scenario', `Duplicated scenario "${sc.name}" → "${copy.name}"`);
  saveToStorage();
  rScenarios();
}

function deleteScenario(id) {
  const sc = getCurrentScenarios().find(s => s.id === id);
  if (!sc) return;
  if (!confirm(`Delete scenario "${sc.name}"?\n\nThis cannot be undone. The base budget is not affected.`)) return;
  const idx = fyStore.years[fyStore.currentFY].scenarios.indexOf(sc);
  fyStore.years[fyStore.currentFY].scenarios.splice(idx, 1);
  activeScenarioId = null;
  logAudit('scenario', `Deleted scenario "${sc.name}"`);
  saveToStorage();
  rScenarios();
}

function addAdjustment() {
  const active = getActiveScenario();
  if (!active) return;
  const scope = document.getElementById('adj-scope').value;
  const targetVal = document.getElementById('adj-target').value;
  const method = document.getElementById('adj-method').value;
  const value = parseFloat(document.getElementById('adj-value').value);
  if (isNaN(value)) { alert('Please enter a numeric value.'); return; }

  const scopeRef = parseTargetRef(scope, targetVal);
  // Build a human-readable label
  const targetLabel = targetVal ? document.getElementById('adj-target').selectedOptions[0]?.textContent : '';
  const scopeLabels = {
    'all':'All budget items', 'category':'Category', 'subcategory':'Subcategory', 'line_item':'Line item',
    'fa190':'FA 190', 'comp_all':'All compensation', 'comp_dept':'Comp dept', 'comp_employee':'Comp employee',
    'projects_all':'All projects', 'project':'Project'
  };
  const scopeStr = scopeLabels[scope] || scope;
  const methodStr = method === 'percent' ? `${value>=0?'+':''}${value}%`
                  : method === 'dollar' ? `${value>=0?'+':''}$${Math.abs(value).toLocaleString()}${value<0?' decrease':''}`.replace('+ -','-')
                  : `set to $${value.toLocaleString()}`;
  const label = targetLabel
    ? `${scopeStr}: ${targetLabel} — ${methodStr}`
    : `${scopeStr} — ${methodStr}`;

  const adj = {
    id: 'adj_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,5),
    enabled: true, scope, scopeRef, method, value, label
  };
  active.adjustments.push(adj);
  logAudit('scenario', `Added adjustment to "${active.name}": ${label}`);
  document.getElementById('adj-value').value = '';
  saveToStorage();
  rScenarios();
}

function toggleAdjustment(id, enabled) {
  const active = getActiveScenario();
  if (!active) return;
  const adj = active.adjustments.find(a => a.id === id);
  if (!adj) return;
  adj.enabled = !!enabled;
  saveToStorage();
  rScenarios();
}

function deleteAdjustment(id) {
  const active = getActiveScenario();
  if (!active) return;
  const idx = active.adjustments.findIndex(a => a.id === id);
  if (idx < 0) return;
  if (!confirm('Remove this adjustment?')) return;
  const adj = active.adjustments[idx];
  active.adjustments.splice(idx, 1);
  logAudit('scenario', `Removed adjustment "${adj.label}" from "${active.name}"`);
  saveToStorage();
  rScenarios();
}

function applyScenarioTo(target) {
  const active = getActiveScenario();
  if (!active) return;
  const working = applyScenario(active, cats, compDepts, projs);

  if (target === 'current') {
    if (!confirm(`Apply scenario "${active.name}" to your current FY ${fyStore.currentFY} budget?\n\nThis will OVERWRITE your current budget values with the scenario values. The scenario itself remains saved for future reference.\n\nThis cannot be undone. Consider exporting JSON first as a backup.`)) return;
    if (!confirm('Are you sure? Your base budget will be replaced with scenario values.')) return;
    cats.length = 0; working.cats.forEach(c => cats.push(c));
    compDepts.length = 0; working.compDepts.forEach(d => compDepts.push(d));
    projs.length = 0; working.projs.forEach(p => projs.push(p));
    bindCurrentYear();
    logAudit('scenario', `Applied scenario "${active.name}" to FY ${fyStore.currentFY}`);
    saveToStorage();
    alert('Scenario applied. Switch to the Budget planner tab to see the updated values.');
    ra();
  } else if (target === 'new') {
    const existing = Object.keys(fyStore.years).sort();
    const maxYear = Math.max(...existing.map(Number));
    const newYear = String(maxYear + 1);
    if (fyStore.years[newYear]) { alert('FY ' + newYear + ' already exists. Delete it first or modify scenarios into the existing year.'); return; }
    if (!confirm(`Create FY ${newYear} using scenario "${active.name}" as the starting budget?\n\nActuals will be reset to zero. The scenario is also copied into the new year.`)) return;
    syncCurrentYear();
    fyStore.years[newYear] = {
      cats: JSON.parse(JSON.stringify(working.cats)),
      compDepts: JSON.parse(JSON.stringify(working.compDepts)),
      projs: JSON.parse(JSON.stringify(working.projs)),
      scenarios: []
    };
    fyStore.years[newYear].cats.forEach(c => c.subs.forEach(s => s.items.forEach(i => i.a = 0)));
    fyStore.years[newYear].compDepts.forEach(d => d.employees.forEach(e => e.items.forEach(i => i.a = 0)));
    fyStore.years[newYear].projs.forEach(p => p.items.forEach(i => i.a = 0));
    fyStore.currentFY = newYear;
    bindCurrentYear();
    logAudit('fiscal_year', `FY ${newYear} created from scenario "${active.name}"`);
    saveToStorage(false);
    refreshFYSelect();
    alert(`FY ${newYear} created. You are now viewing it.`);
    ra();
  }
}

function exportScenarioJSON(id) {
  const sc = getCurrentScenarios().find(s => s.id === id);
  if (!sc) return;
  const exportData = {
    format: 'itbudget-scenario-v1',
    fiscalYear: fyStore.currentFY,
    exported: new Date().toISOString(),
    scenario: sc
  };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `scenario_${sc.name.replace(/[^a-z0-9]/gi,'_')}_FY${fyStore.currentFY}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  logAudit('scenario', `Exported scenario "${sc.name}"`);
}

// ===== Top Movers =====
function renderTopMovers() {
  // Build flat list of all items (planner + comp + projects)
  const items = [];
  cats.forEach(cat => cat.subs.forEach(sub => sub.items.forEach(it => {
    if (it.b > 0 || (it.a||0) > 0) {
      items.push({
        source: 'Planner', path: `${cat.n} › ${sub.n} › ${it.n}`,
        budget: it.b, actual: it.a||0, variance: it.b - (it.a||0),
        pct: it.b > 0 ? ((it.a||0)/it.b*100) : 0
      });
    }
  })));
  compDepts.forEach(d => d.employees.forEach(e => e.items.forEach(i => {
    if (i.b > 0 || (i.a||0) > 0) {
      items.push({
        source: 'Comp', path: `${d.n} › ${e.n} › ${i.n}`,
        budget: i.b, actual: i.a||0, variance: i.b - (i.a||0),
        pct: i.b > 0 ? ((i.a||0)/i.b*100) : 0
      });
    }
  })));
  projs.forEach(p => p.items.forEach(i => {
    if (i.b > 0 || (i.a||0) > 0) {
      items.push({
        source: 'Project', path: `${p.n} › ${i.n}`,
        budget: i.b, actual: i.a||0, variance: i.b - (i.a||0),
        pct: i.b > 0 ? ((i.a||0)/i.b*100) : 0
      });
    }
  }));

  const overByDollar = items.filter(i => i.variance < 0).sort((a,b) => a.variance - b.variance).slice(0, 10);
  const underByDollar = items.filter(i => i.variance > 0).sort((a,b) => b.variance - a.variance).slice(0, 10);
  const overByPct = items.filter(i => i.variance < 0 && i.budget > 0).sort((a,b) => (a.variance/a.budget) - (b.variance/b.budget)).slice(0, 10);
  const unspent = items.filter(i => (i.actual||0) === 0 && i.budget > 0).sort((a,b) => b.budget - a.budget).slice(0, 10);

  function moverRow(i, color) {
    const pctStr = i.budget > 0 ? Math.round(Math.abs(i.variance)/i.budget*100)+'%' : '—';
    return `<tr>
      <td style="padding:6px 8px"><span style="font-size:10px;color:var(--color-text-tertiary);margin-right:6px">${i.source}</span>${i.path}</td>
      <td style="padding:6px 8px;text-align:right;color:var(--color-text-secondary);font-size:12px">${fm(i.budget)}</td>
      <td style="padding:6px 8px;text-align:right;color:var(--color-text-secondary);font-size:12px">${fm(i.actual)}</td>
      <td style="padding:6px 8px;text-align:right;font-weight:500;color:${color}">${i.variance<0?'-':''}${fm(Math.abs(i.variance))}</td>
      <td style="padding:6px 8px;text-align:right;color:${color};font-size:12px">${pctStr}</td>
    </tr>`;
  }

  const headerRow = `<thead><tr>
    <th style="padding:6px 8px;width:50%">Item</th>
    <th style="padding:6px 8px;text-align:right">Budget</th>
    <th style="padding:6px 8px;text-align:right">Actual</th>
    <th style="padding:6px 8px;text-align:right">Variance</th>
    <th style="padding:6px 8px;text-align:right">%</th>
  </tr></thead>`;

  return `
  <div class="card">
    <h3 style="margin:0 0 8px;font-size:16px;font-weight:500">Top 10 over budget (by $ variance)</h3>
    <p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 12px">Items where actual spend exceeds budget the most in absolute dollars.</p>
    ${overByDollar.length === 0 ? '<p style="font-size:13px;color:var(--color-text-secondary);padding:12px 0">No items over budget.</p>' :
      `<table>${headerRow}<tbody>${overByDollar.map(i => moverRow(i, '#A32D2D')).join('')}</tbody></table>`}
  </div>

  <div class="card">
    <h3 style="margin:0 0 8px;font-size:16px;font-weight:500">Top 10 under budget (by $ variance)</h3>
    <p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 12px">Items with the largest unspent budget. Could indicate unused capacity or reallocation opportunities.</p>
    ${underByDollar.length === 0 ? '<p style="font-size:13px;color:var(--color-text-secondary);padding:12px 0">No items under budget.</p>' :
      `<table>${headerRow}<tbody>${underByDollar.map(i => moverRow(i, '#0F6E56')).join('')}</tbody></table>`}
  </div>

  <div class="card">
    <h3 style="margin:0 0 8px;font-size:16px;font-weight:500">Worst overruns (by % over budget)</h3>
    <p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 12px">Items where actual exceeds budget by the largest percentage. Smaller-dollar items can show up here disproportionately.</p>
    ${overByPct.length === 0 ? '<p style="font-size:13px;color:var(--color-text-secondary);padding:12px 0">No items over budget.</p>' :
      `<table>${headerRow}<tbody>${overByPct.map(i => moverRow(i, '#A32D2D')).join('')}</tbody></table>`}
  </div>

  <div class="card">
    <h3 style="margin:0 0 8px;font-size:16px;font-weight:500">Top 10 unspent line items (by budget size)</h3>
    <p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 12px">Items with budget allocated but zero actual spend. Worth reviewing for cancellation, deferral, or reallocation.</p>
    ${unspent.length === 0 ? '<p style="font-size:13px;color:var(--color-text-secondary);padding:12px 0">All items have at least some actual spend.</p>' :
      `<table>${headerRow}<tbody>${unspent.map(i => moverRow(i, 'var(--color-text-secondary)')).join('')}</tbody></table>`}
  </div>`;
}

// ===== Year-over-year comparison =====
function renderYearComparison() {
  const allYears = Object.keys(fyStore.years).sort();
  const otherYears = allYears.filter(y => y !== fyStore.currentFY);
  const compareYear = reportsYoYCompare && fyStore.years[reportsYoYCompare]
    ? reportsYoYCompare
    : (otherYears[otherYears.length - 1] || null);

  let html = `<div class="card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem;flex-wrap:wrap">
      <h3 style="margin:0;font-size:16px;font-weight:500">Year-over-year comparison</h3>
      <label style="font-size:13px;color:var(--color-text-secondary)">Compare FY ${fyStore.currentFY} vs.</label>
      <select onchange="reportsYoYCompare=this.value;rReports()" style="font-size:13px;padding:4px 8px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary)">
        ${otherYears.length === 0 ? '<option>No other years available</option>' :
          otherYears.map(y => `<option value="${y}"${y===compareYear?' selected':''}>FY ${y}</option>`).join('')}
      </select>
    </div>`;

  if (!compareYear) {
    html += `<p style="font-size:13px;color:var(--color-text-secondary);padding:12px 0">No other fiscal years to compare against. Use "+ Year" in the toolbar to create another year.</p></div>`;
    return html;
  }

  const otherYear = fyStore.years[compareYear];
  // Build comparison: current FY budget vs prior FY budget
  const currentTotals = cats.reduce((s, c) => s + cB(c), 0);
  const compareBudget = otherYear.cats.reduce((s, c) =>
    s + c.subs.reduce((ss, sub) => ss + sub.items.reduce((sss, i) => sss + i.b, 0), 0), 0);

  const totalChange = currentTotals - compareBudget;
  const totalChangePct = compareBudget > 0 ? (totalChange / compareBudget * 100) : 0;

  html += `<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:1.5rem">
    <div style="padding:1rem;background:var(--color-background-secondary);border-radius:8px">
      <div style="font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">FY ${fyStore.currentFY} budget</div>
      <div style="font-size:20px;font-weight:500">${fk(currentTotals)}</div>
    </div>
    <div style="padding:1rem;background:var(--color-background-secondary);border-radius:8px">
      <div style="font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">FY ${compareYear} budget</div>
      <div style="font-size:20px;font-weight:500">${fk(compareBudget)}</div>
    </div>
    <div style="padding:1rem;background:var(--color-background-secondary);border-radius:8px">
      <div style="font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">YoY change</div>
      <div style="font-size:20px;font-weight:500;color:${totalChange>=0?'#A32D2D':'#0F6E56'}">${totalChange>=0?'+':''}${fk(totalChange)}</div>
      <div style="font-size:12px;color:${totalChange>=0?'#A32D2D':'#0F6E56'};margin-top:3px">${totalChange>=0?'+':''}${totalChangePct.toFixed(1)}%</div>
    </div>
  </div>

  <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
    <button class="tbtn2" onclick="toggleYoYChart()" style="font-size:11px;padding:3px 10px">${yoyChartHidden ? 'Show chart' : 'Hide chart'}</button>
  </div>
  ${yoyChartHidden ? '' : '<div style="position:relative;height:340px;margin-bottom:1.5rem"><canvas id="yoyChart" role="img" aria-label="Year-over-year category comparison"></canvas></div>'}

  <table>
    <thead><tr>
      <th style="text-align:left;padding:6px 8px">Category</th>
      <th style="text-align:right;padding:6px 8px">FY ${compareYear} budget</th>
      <th style="text-align:right;padding:6px 8px">FY ${fyStore.currentFY} budget</th>
      <th style="text-align:right;padding:6px 8px">Change ($)</th>
      <th style="text-align:right;padding:6px 8px">Change (%)</th>
    </tr></thead>
    <tbody>`;

  // Union of categories from both years
  const allCatNames = new Set([...cats.map(c => c.n), ...otherYear.cats.map(c => c.n)]);
  const rows = [];
  allCatNames.forEach(name => {
    const curCat = cats.find(c => c.n === name);
    const oldCat = otherYear.cats.find(c => c.n === name);
    const curBudget = curCat ? cB(curCat) : 0;
    const oldBudget = oldCat ? oldCat.subs.reduce((s, sub) => s + sub.items.reduce((ss, i) => ss + i.b, 0), 0) : 0;
    const change = curBudget - oldBudget;
    const changePct = oldBudget > 0 ? (change / oldBudget * 100) : null;
    const color = curCat ? curCat.c : (oldCat ? oldCat.c : '#888780');
    rows.push({ name, curBudget, oldBudget, change, changePct, color });
  });
  rows.sort((a,b) => Math.abs(b.change) - Math.abs(a.change));

  rows.forEach(r => {
    html += `<tr>
      <td style="padding:6px 8px"><span class="dot" style="background:${r.color}"></span>${r.name}</td>
      <td style="padding:6px 8px;text-align:right">${fm(r.oldBudget)}</td>
      <td style="padding:6px 8px;text-align:right">${fm(r.curBudget)}</td>
      <td style="padding:6px 8px;text-align:right;font-weight:500;color:${r.change>=0?'#A32D2D':'#0F6E56'}">${r.change>=0?'+':'-'}${fm(Math.abs(r.change))}</td>
      <td style="padding:6px 8px;text-align:right;color:${r.change>=0?'#A32D2D':'#0F6E56'}">${r.changePct === null ? '—' : (r.changePct>=0?'+':'')+r.changePct.toFixed(1)+'%'}</td>
    </tr>`;
  });

  html += `<tr style="border-top:1px solid var(--color-border-primary);font-weight:500;background:var(--color-background-secondary)">
    <td style="padding:8px">Total</td>
    <td style="padding:8px;text-align:right">${fm(compareBudget)}</td>
    <td style="padding:8px;text-align:right">${fm(currentTotals)}</td>
    <td style="padding:8px;text-align:right;color:${totalChange>=0?'#A32D2D':'#0F6E56'}">${totalChange>=0?'+':'-'}${fm(Math.abs(totalChange))}</td>
    <td style="padding:8px;text-align:right;color:${totalChange>=0?'#A32D2D':'#0F6E56'}">${totalChange>=0?'+':''}${totalChangePct.toFixed(1)}%</td>
  </tr>`;

  html += `</tbody></table></div>`;
  return html;
}

function renderYoYChart() {
  const canvas = document.getElementById('yoyChart');
  if (!canvas || typeof Chart === 'undefined') return;
  const allYears = Object.keys(fyStore.years).sort();
  const otherYears = allYears.filter(y => y !== fyStore.currentFY);
  const compareYear = reportsYoYCompare && fyStore.years[reportsYoYCompare]
    ? reportsYoYCompare
    : (otherYears[otherYears.length - 1] || null);
  if (!compareYear) return;
  const otherYear = fyStore.years[compareYear];

  const allCatNames = Array.from(new Set([...cats.map(c => c.n), ...otherYear.cats.map(c => c.n)]));
  const labels = allCatNames;
  const oldData = labels.map(name => {
    const c = otherYear.cats.find(x => x.n === name);
    return c ? c.subs.reduce((s, sub) => s + sub.items.reduce((ss, i) => ss + i.b, 0), 0) : 0;
  });
  const newData = labels.map(name => {
    const c = cats.find(x => x.n === name);
    return c ? cB(c) : 0;
  });

  if (window._yoyChart) window._yoyChart.destroy();
  window._yoyChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: `FY ${compareYear} budget`, data: oldData, backgroundColor: '#B5D4F4', borderColor: '#378ADD', borderWidth: 1 },
        { label: `FY ${fyStore.currentFY} budget`, data: newData, backgroundColor: '#378ADD', borderWidth: 0 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { boxWidth: 12, font: { size: 11 } } },
        tooltip: { callbacks: { label: c => ` ${c.dataset.label}: $${Math.round(c.raw).toLocaleString()}` } }
      },
      scales: {
        x: { ticks: { autoSkip: false, maxRotation: 35, font: { size: 11 } } },
        y: { ticks: { callback: v => '$' + (Math.abs(v)>=1e6 ? (v/1e6).toFixed(1)+'M' : (v/1000).toFixed(0)+'K'), font: { size: 11 } } }
      }
    }
  });
}

// ===== FA 190 Year Comparison =====
function renderFA190YearComparison() {
  const allYears = Object.keys(fyStore.years).sort();
  const otherYears = allYears.filter(y => y !== fyStore.currentFY);
  const compareYear = reportsYoYCompare && fyStore.years[reportsYoYCompare]
    ? reportsYoYCompare
    : (otherYears[otherYears.length - 1] || null);

  let html = `<div class="card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem;flex-wrap:wrap">
      <h3 style="margin:0;font-size:16px;font-weight:500">FA 190 year-over-year comparison</h3>

        ${otherYears.length === 0 ? '<option>No other years available</option>' :

      </select>
      <button class="tbtn2" onclick="reportsFA190SortByChange=!reportsFA190SortByChange;rReports()" style="font-size:12px;padding:4px 10px" title="Toggle table sort order">
        ${reportsFA190SortByChange ? '↕ Sorted by $ change' : '↕ Sort by $ change'}
      </button>
    </div>
    <p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 1rem">
      Compares FA 190 budget allocations between fiscal years. Items must be tagged with an FA 190 category in the Budget planner to appear here. Compensation items auto-map: Salary/Bonus/Equity → Compensation, Benefits → Employee Benefits.
    </p>`;

  if (!compareYear) {
    html += `<p style="font-size:13px;color:var(--color-text-secondary);padding:12px 0">No other fiscal years to compare against. Use "+ Year" in the toolbar to create another year.</p></div>`;
    return html;
  }

  const curRollup = buildFA190BudgetForYear(fyStore.currentFY);
  const oldRollup = buildFA190BudgetForYear(compareYear);

  const curTotal = FA190_CATEGORIES.reduce((s, c) => s + curRollup.byCategory[c], 0);
  const oldTotal = FA190_CATEGORIES.reduce((s, c) => s + oldRollup.byCategory[c], 0);
  const totalChange = curTotal - oldTotal;
  const totalChangePct = oldTotal > 0 ? (totalChange / oldTotal * 100) : 0;

  // Warn if either year has unassigned budget
  const warnings = [];
  if (curRollup.unassigned > 0) warnings.push(`FY ${fyStore.currentFY} has ${fk(curRollup.unassigned)} of unassigned budget not included below.`);
  if (oldRollup.unassigned > 0) warnings.push(`FY ${compareYear} has ${fk(oldRollup.unassigned)} of unassigned budget not included below.`);

  html += `<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:1.5rem">
    <div style="padding:1rem;background:var(--color-background-secondary);border-radius:8px">
      <div style="font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">FY ${fyStore.currentFY} FA 190 budget</div>
      <div style="font-size:20px;font-weight:500">${fk(curTotal)}</div>
    </div>
    <div style="padding:1rem;background:var(--color-background-secondary);border-radius:8px">
      <div style="font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">FY ${compareYear} FA 190 budget</div>
      <div style="font-size:20px;font-weight:500">${fk(oldTotal)}</div>
    </div>
    <div style="padding:1rem;background:var(--color-background-secondary);border-radius:8px">
      <div style="font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">YoY change</div>
      <div style="font-size:20px;font-weight:500;color:${totalChange>=0?'#A32D2D':'#0F6E56'}">${totalChange>=0?'+':''}${fk(totalChange)}</div>
      <div style="font-size:12px;color:${totalChange>=0?'#A32D2D':'#0F6E56'};margin-top:3px">${totalChange>=0?'+':''}${totalChangePct.toFixed(1)}%</div>
    </div>
  </div>`;

  if (warnings.length > 0) {
    html += `<div style="padding:10px 12px;background:#FFF8E5;border-radius:6px;border-left:3px solid #BA7517;margin-bottom:1.5rem;font-size:12px;color:#7A4D0C">
      ${warnings.join('<br>')}
    </div>`;
  }

  html += `<div style="display:flex;justify-content:flex-end;margin-bottom:8px">
    <button class="tbtn2" onclick="toggleFA190YoyChart()" style="font-size:11px;padding:3px 10px">${fa190YoyChartHidden ? 'Show chart' : 'Hide chart'}</button>
  </div>
  ${fa190YoyChartHidden ? '' : '<div style="position:relative;height:340px;margin-bottom:1.5rem"><canvas id="fa190YoyChart" role="img" aria-label="FA 190 year-over-year comparison chart"></canvas></div>'}

  <table>
    <thead><tr>
      <th style="text-align:left;padding:6px 8px">FA 190 Category</th>
      <th style="text-align:right;padding:6px 8px">FY ${compareYear} budget</th>
      <th style="text-align:right;padding:6px 8px">FY ${fyStore.currentFY} budget</th>
      <th style="text-align:right;padding:6px 8px">Change ($)</th>
      <th style="text-align:right;padding:6px 8px">Change (%)</th>
      <th style="text-align:right;padding:6px 8px">Mix shift</th>
    </tr></thead>
    <tbody>`;

  // Build rows, sorted by absolute dollar change descending
  const rows = FA190_CATEGORIES.map(faName => {
    const curB = curRollup.byCategory[faName];
    const oldB = oldRollup.byCategory[faName];
    const change = curB - oldB;
    const changePct = oldB > 0 ? (change / oldB * 100) : (curB > 0 ? null : 0); // null = "new" category
    const curMix = curTotal > 0 ? (curB / curTotal * 100) : 0;
    const oldMix = oldTotal > 0 ? (oldB / oldTotal * 100) : 0;
    const mixShift = curMix - oldMix;
    return { faName, curB, oldB, change, changePct, curMix, oldMix, mixShift };
  }).filter(r => r.curB > 0 || r.oldB > 0); // hide rows that are zero in both years

  // Sort order: canonical FA 190 order by default, or by absolute $ change if toggled on.
  if (reportsFA190SortByChange) {
    rows.sort((a, b) => Math.abs(b.change) - Math.abs(a.change));
  }

  rows.forEach(r => {
    const color = FA190_COLORS[r.faName];
    const changeColor = r.change >= 0 ? '#A32D2D' : '#0F6E56';
    const mixColor = r.mixShift >= 0 ? '#185FA5' : '#888780';
    html += `<tr>
      <td style="padding:6px 8px"><span class="dot" style="background:${color}"></span>${r.faName}</td>
      <td style="padding:6px 8px;text-align:right">${r.oldB > 0 ? fm(r.oldB) : '—'}</td>
      <td style="padding:6px 8px;text-align:right">${r.curB > 0 ? fm(r.curB) : '—'}</td>
      <td style="padding:6px 8px;text-align:right;font-weight:500;color:${changeColor}">${r.change >= 0 ? '+' : '-'}${fm(Math.abs(r.change))}</td>
      <td style="padding:6px 8px;text-align:right;color:${changeColor}">${r.changePct === null ? '<em style="color:var(--color-text-tertiary)">new</em>' : (r.changePct>=0?'+':'')+r.changePct.toFixed(1)+'%'}</td>
      <td style="padding:6px 8px;text-align:right;font-size:12px;color:${mixColor}">${r.mixShift>=0?'+':''}${r.mixShift.toFixed(1)} pts</td>
    </tr>`;
  });

  html += `<tr style="border-top:1px solid var(--color-border-primary);font-weight:500;background:var(--color-background-secondary)">
    <td style="padding:8px">Total</td>
    <td style="padding:8px;text-align:right">${fm(oldTotal)}</td>
    <td style="padding:8px;text-align:right">${fm(curTotal)}</td>
    <td style="padding:8px;text-align:right;color:${totalChange>=0?'#A32D2D':'#0F6E56'}">${totalChange>=0?'+':'-'}${fm(Math.abs(totalChange))}</td>
    <td style="padding:8px;text-align:right;color:${totalChange>=0?'#A32D2D':'#0F6E56'}">${totalChange>=0?'+':''}${totalChangePct.toFixed(1)}%</td>
    <td style="padding:8px;text-align:right;font-size:12px;color:var(--color-text-secondary)">—</td>
  </tr>`;

  html += `</tbody></table>
  <p style="font-size:11px;color:var(--color-text-tertiary);margin:10px 0 0">"Mix shift" shows how each category's share of total FA 190 budget changed in percentage points. A positive mix shift means the category is taking a bigger slice of the pie this year.</p>
  </div>`;
  return html;
}

function renderFA190YoYChart() {
  const canvas = document.getElementById('fa190YoyChart');
  if (!canvas || typeof Chart === 'undefined') return;
  const allYears = Object.keys(fyStore.years).sort();
  const otherYears = allYears.filter(y => y !== fyStore.currentFY);
  const compareYear = reportsYoYCompare && fyStore.years[reportsYoYCompare]
    ? reportsYoYCompare
    : (otherYears[otherYears.length - 1] || null);
  if (!compareYear) return;

  const curRollup = buildFA190BudgetForYear(fyStore.currentFY);
  const oldRollup = buildFA190BudgetForYear(compareYear);

  // Only show categories that have spend in either year
  const usedCats = FA190_CATEGORIES.filter(c => curRollup.byCategory[c] > 0 || oldRollup.byCategory[c] > 0);
  if (usedCats.length === 0) {
    canvas.parentElement.innerHTML = '<p style="font-size:13px;color:var(--color-text-secondary);text-align:center;padding-top:120px">No FA 190 data tagged in either year. Tag items in the Budget planner to populate this view.</p>';
    return;
  }

  const oldData = usedCats.map(c => oldRollup.byCategory[c]);
  const newData = usedCats.map(c => curRollup.byCategory[c]);

  if (window._fa190YoyChart) window._fa190YoyChart.destroy();
  window._fa190YoyChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: usedCats,
      datasets: [
        { label: `FY ${compareYear} budget`, data: oldData, backgroundColor: usedCats.map(c => FA190_COLORS[c] + '60'), borderColor: usedCats.map(c => FA190_COLORS[c]), borderWidth: 1 },
        { label: `FY ${fyStore.currentFY} budget`, data: newData, backgroundColor: usedCats.map(c => FA190_COLORS[c]), borderWidth: 0 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { boxWidth: 12, font: { size: 11 } } },
        tooltip: { callbacks: { label: c => ` ${c.dataset.label}: $${Math.round(c.raw).toLocaleString()}` } }
      },
      scales: {
        x: { ticks: { autoSkip: false, maxRotation: 35, font: { size: 11 } } },
        y: { ticks: { callback: v => '$' + (Math.abs(v)>=1e6 ? (v/1e6).toFixed(1)+'M' : (v/1000).toFixed(0)+'K'), font: { size: 11 } } }
      }
    }
  });
}

    </div>`;

  // Comparison table: Categories
  html += `<h4 style="margin:1rem 0 8px;font-size:14px;font-weight:500">Category-level comparison</h4>
  <div style="overflow-x:auto"><table style="min-width:100%">
    <thead><tr>
      <th style="text-align:left;padding:6px 8px">Category</th>
      <th style="text-align:right;padding:6px 8px">Base</th>
      ${scenarios.map(sc => `<th style="text-align:right;padding:6px 8px">${sc.name}</th>`).join('')}

  cats.forEach((cat, ci) => {
    const baseB = cB(cat);
    html += `<tr>
      <td style="padding:6px 8px"><span class="dot" style="background:${cat.c}"></span>${cat.n}</td>
      <td style="padding:6px 8px;text-align:right">${fm(baseB)}</td>`;
    scenWorks.forEach(sw => {
      const scenCat = sw.working.cats[ci];
      const scenB = scenCat ? scenCat.subs.reduce((s, sub) => s + sub.items.reduce((ss, i) => ss + (i.b||0), 0), 0) : 0;
      const delta = scenB - baseB;
      const color = delta === 0 ? 'var(--color-text-primary)' : delta > 0 ? '#A32D2D' : '#0F6E56';
      html += `<td style="padding:6px 8px;text-align:right;color:${color}">${fm(scenB)}${delta!==0?`<br><span style="font-size:11px">${delta>0?'+':'-'}${fm(Math.abs(delta))}</span>`:''}</td>`;
    });
    html += `</tr>`;
  });

  // Compensation row
  const baseComp = compTotalB();
  html += `<tr>
    <td style="padding:6px 8px"><span class="dot" style="background:#185FA5"></span>Compensation</td>
    <td style="padding:6px 8px;text-align:right">${fm(baseComp)}</td>`;
  scenWorks.forEach(sw => {

    const delta = sct - baseComp;
    const color = delta === 0 ? 'var(--color-text-primary)' : delta > 0 ? '#A32D2D' : '#0F6E56';

  html += `<tr style="border-top:1px solid var(--color-border-primary);font-weight:500;background:var(--color-background-secondary)">
    <td style="padding:8px">Total</td>
    <td style="padding:8px;text-align:right">${fm(baseTotals.total)}</td>`;
  scenTotals.forEach(t => {

    const color = delta === 0 ? 'var(--color-text-primary)' : delta > 0 ? '#A32D2D' : '#0F6E56';
    html += `<td style="padding:8px;text-align:right;color:${color}">${fm(t.total)}${delta!==0?`<br><span style="font-size:11px">${delta>0?'+':'-'}${fm(Math.abs(delta))}</span>`:''}</td>`;

      html += `<td style="padding:6px 8px;text-align:right;color:${color}">${v>0?fm(v):'—'}${delta!==0?`<br><span style="font-size:11px">${delta>0?'+':'-'}${fm(Math.abs(delta))}</span>`:''}</td>`;

      html += `</ul>`;

  });

  html += `</div>`;
  return html;
