<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Budget Dashboard</title>
<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f3;
  --color-background-tertiary: #eeece8;
  --color-text-primary: #1a1a19;
  --color-text-secondary: #5f5e5a;
  --color-text-tertiary: #888780;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.22);
  --color-border-primary: rgba(0,0,0,0.32);
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --font-sans: system-ui, -apple-system, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-background-primary: #1e1e1c;
    --color-background-secondary: #2a2a28;
    --color-background-tertiary: #333330;
    --color-text-primary: #f0ede8;
    --color-text-secondary: #a8a69f;
    --color-text-tertiary: #6e6c67;
    --color-border-tertiary: rgba(255,255,255,0.10);
    --color-border-secondary: rgba(255,255,255,0.18);
    --color-border-primary: rgba(255,255,255,0.28);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary);padding:1.5rem}
h2{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:1rem}
.mx{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.mc{background:var(--color-background-secondary);border-radius:8px;padding:1rem}
.ml{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px}
.mv{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.ms{font-size:12px;margin-top:4px}
.gd{color:#0F6E56}.wa{color:#BA7517}.bd{color:#A32D2D}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;overflow-x:auto}
.tabs{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.tab{font-size:13px;padding:5px 14px;border-radius:8px;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.tab.on{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}
table{width:100%;font-size:13px;border-collapse:collapse}
th{text-align:left;font-weight:500;font-size:11px;color:var(--color-text-secondary);padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap}
td{padding:6px 8px;color:var(--color-text-primary);border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap}
.cr{background:var(--color-background-secondary)}
.cr td{font-weight:500}
.sr td:first-child{padding-left:28px;color:var(--color-text-secondary);font-weight:400}
.sr2 td:first-child{padding-left:48px;color:var(--color-text-tertiary);font-size:12px;font-weight:400}
tr.tr td{font-weight:500;border-top:1px solid var(--color-border-primary);border-bottom:none;background:var(--color-background-secondary)}
.tbtn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:11px;padding:0 3px}
.dbtn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:13px;padding:0 3px}
.dbtn:hover{color:#A32D2D}
.abtn{font-size:12px;padding:4px 10px;border-radius:8px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;margin-top:10px;display:inline-block}
.abtn:hover{background:var(--color-background-secondary)}
.bw{background:var(--color-background-secondary);border-radius:4px;height:7px;overflow:hidden;width:70px;display:inline-block;vertical-align:middle}
.bi{height:100%;border-radius:4px}
input[type=number]{font-size:12px;width:90px;padding:2px 4px;border:0.5px solid var(--color-border-tertiary);border-radius:4px;background:var(--color-background-primary);color:var(--color-text-primary)}
input[type=text]{font-size:12px;padding:2px 5px;border:0.5px solid var(--color-border-tertiary);border-radius:4px;background:transparent;color:var(--color-text-primary)}
select{font-size:12px;padding:2px 4px;border-radius:4px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.badge{display:inline-block;font-size:11px;padding:2px 6px;border-radius:4px;font-weight:500}
.b-ok{background:#E1F5EE;color:#085041}
.b-bd{background:#FCEBEB;color:#791F1F}
.comp-header{background:var(--color-background-secondary);border-left:3px solid #5DCAA5}
.comp-header td{font-weight:500;font-size:13px}

.tbtn2{font-size:12px;padding:5px 10px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer}
.tbtn2:hover{background:var(--color-background-secondary)}

.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:var(--color-background-primary);border-radius:12px;padding:1.5rem;max-width:720px;width:100%;max-height:80vh;overflow-y:auto;border:0.5px solid var(--color-border-tertiary)}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-head h3{margin:0;font-size:16px;font-weight:500}
.close-btn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:18px;padding:0 6px}
.audit-row{padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.audit-row:last-child{border-bottom:none}
.audit-time{color:var(--color-text-secondary);font-size:11px}
.audit-change{color:var(--color-text-primary);margin-top:2px}
.audit-old{color:#A32D2D;text-decoration:line-through}
.audit-new{color:#0F6E56;font-weight:500}

input[type=number]:focus,input[type=text]:focus{outline:none;border-color:var(--color-border-primary);box-shadow:0 0 0 2px rgba(55,138,221,0.15)}

@media print{
  body{background:#fff !important;padding:0 !important}
  .no-print{display:none !important}
  .tabs{display:none !important}
  .card{border:1px solid #ccc !important;break-inside:avoid;page-break-inside:avoid;margin-bottom:1rem !important}
  #s-plan,#s-act,#s-comp,#s-proj,#s-fa{display:block !important;page-break-before:always}
  #s-plan{page-break-before:auto}
  .tbtn,.abtn,.dbtn,input[type=file],.print-hide,button.tbtn,button.abtn,button.dbtn{display:none !important}
  input[type=number],input[type=text]{border:none !important;background:transparent !important;padding:0 !important;font-weight:inherit;color:#000 !important}
  input[type=color]{display:none !important}
  table{font-size:11px !important}
  th{background:#eee !important;color:#000 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .cr{background:#f5f5f5 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  tr.tr td{background:#e8e8e8 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{margin:0.5in;size:landscape}
  h2::after{content:" — FY " attr(data-fy);font-weight:400;color:#555}
}
</style>
</head>
<body>
<div>
<div class="no-print" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <h2 style="margin:0">IT Budget Dashboard</h2>
    <div style="display:flex;align-items:center;gap:6px">
      <label style="font-size:12px;color:var(--color-text-secondary)">FY</label>
      <select id="fy-select" onchange="changeFY(this.value)" style="font-size:12px;padding:4px 8px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary)"></select>
      <button onclick="addFY()" class="tbtn2" title="Add new fiscal year">+ Year</button>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <input type="search" id="search-input" placeholder="Search…" oninput="searchQuery=this.value.toLowerCase();ra()" style="font-size:12px;padding:5px 10px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary);width:140px" />
    <span id="save-status" style="font-size:12px;color:var(--color-text-secondary)"></span>
    <button onclick="exportData()" class="tbtn2">Export JSON</button>
    <button onclick="exportCSV()" class="tbtn2">Export CSV</button>
    <label class="tbtn2" style="cursor:pointer">
      Import JSON<input type="file" accept=".json" onchange="importData(event)" style="display:none">
    </label>
    <label class="tbtn2" style="cursor:pointer">
      Import CSV<input type="file" accept=".csv,.txt" onchange="importCSV(event)" style="display:none">
    </label>
    <button onclick="showAuditLog()" class="tbtn2">History</button>
    <button onclick="showSyncMenu()" class="tbtn2" title="Sync to GitHub Gist">☁</button>
    <button onclick="printReport()" class="tbtn2">Print</button>
    <button onclick="securityMenu()" class="tbtn2" title="Passphrase & lock options">🔒</button>
    <button onclick="resetData()" class="tbtn2" style="color:var(--color-text-secondary)">Reset</button>
  </div>
</div>
<div class="mx" id="mx"></div>
<div class="tabs">
  <button class="tab on" onclick="showTab('plan')">Budget planner</button>
  <button class="tab" onclick="showTab('act')">Budget vs. actuals</button>
  <button class="tab" onclick="showTab('comp')">Compensation</button>
  <button class="tab" onclick="showTab('proj')">Project estimator</button>
  <button class="tab" onclick="showTab('fa')">FA 190</button>
</div>
<div id="s-plan"></div>
<div id="s-act" style="display:none"></div>
<div id="s-comp" style="display:none"></div>
<div id="s-proj" style="display:none"></div>
<div id="s-fa" style="display:none"></div>
</div>

const $=id=>document.getElementById(id);
const fm=n=>'$'+Math.round(Math.abs(n)).toLocaleString();
const fk=n=>{let a=Math.abs(n);return(n<0?'-':'')+'$'+(a>=1e6?(Math.round(a/1e5)/10)+'M':a>=1000?Math.round(a/1000)+'K':Math.round(a));};
const subB=s=>s.items.reduce((s,i)=>s+i.b,0);
const subA=s=>s.items.reduce((s,i)=>s+(i.a||0),0);
const cB=c=>c.subs.reduce((s,sub)=>s+subB(sub),0);
const cA=c=>c.subs.reduce((s,sub)=>s+subA(sub),0);
const gB=()=>cats.reduce((s,c)=>s+cB(c),0);
const gA=()=>cats.reduce((s,c)=>s+cA(c),0);
const empB=e=>e.items.reduce((s,i)=>s+i.b,0);
const empA=e=>e.items.reduce((s,i)=>s+(i.a||0),0);
const deptB=d=>d.employees.reduce((s,e)=>s+empB(e),0);
const deptA=d=>d.employees.reduce((s,e)=>s+empA(e),0);
const compTotalB=()=>compDepts.reduce((s,d)=>s+deptB(d),0);
const compTotalA=()=>compDepts.reduce((s,d)=>s+deptA(d),0);
const pB=p=>p.items.reduce((s,i)=>s+i.b,0);
const pA=p=>p.items.reduce((s,i)=>s+(i.a||0),0);
const apB=()=>projs.reduce((s,p)=>s+pB(p),0);
const bar=(b,a)=>{if(!b)return'';const pct=Math.min(Math.round((a||0)/b*100),100),col=pct>100?'#E24B4A':pct>90?'#EF9F27':'#1D9E75';return`<div class="bw"><div class="bi" style="width:${pct}%;background:${col}"></div></div>`;};
const vcls=v=>v>=0?'gd':'bd';
const badge=(b,a)=>{const v=b-(a||0),p=Math.round(Math.abs(v)/b*100);if(v===0)return`<span class="badge b-ok">On budget</span>`;if(v>0)return`<span class="badge b-ok">-${p}%</span>`;return`<span class="badge b-bd">+${p}%</span>`;};

  'Personnel Expenses':'#7F77DD',
  'Conferences and Meetings':'#EF9F27',
  'Equipment':'#378ADD',
  'Professional and Consulting':'#D4537E',
  'Support and Other Services':'#5DCAA5',
  'Depreciation':'#888780'
};
const FA190_UNASSIGNED = '— Unassigned —';

// Search/filter state
let searchQuery = '';
function matchesSearch(text) {
  if (!searchQuery) return true;
  return String(text || '').toLowerCase().includes(searchQuery);
}
function catMatches(cat) {
  if (!searchQuery) return true;
  if (matchesSearch(cat.n)) return true;
  return cat.subs.some(sub => subMatches(sub));
}
function subMatches(sub) {
  if (!searchQuery) return true;
  if (matchesSearch(sub.n)) return true;
  return sub.items.some(it => matchesSearch(it.n));
}
function deptMatches(dept) {
  if (!searchQuery) return true;
  if (matchesSearch(dept.n)) return true;
  return dept.employees.some(e => matchesSearch(e.n) || matchesSearch(e.title) || e.items.some(i => matchesSearch(i.n)));
}
function projMatches(proj) {
  if (!searchQuery) return true;
  if (matchesSearch(proj.n)) return true;
  return proj.items.some(i => matchesSearch(i.n));
}

// FA 190 keyword suggestion engine (#2)
const FA190_KEYWORDS = [
  { fa: 'Equipment', kw: ['laptop','dell','server','hardware','peripheral','monitor','device','wifi','router','switch','firewall appliance','ups','storage','san','nas','colocation','disaster recovery','dr platform','backup'] },
  { fa: 'Support and Other Services', kw: ['license','licensing','subscription','saas','aws','azure','google workspace','snowflake','cloudflare','salesforce','workday','servicenow','microsoft 365','m365','office 365','adobe','crowdstrike','okta','qualys','zoom','mpls','wireless','internet','circuit','sd-wan','cdn'] },
  { fa: 'Professional and Consulting', kw: ['consulting','consultant','contract','contractor','professional services','implementation','sap consulting','architect (contract)','pmo'] },
  { fa: 'Compensation', kw: ['salary','staff','help desk staff','field technicians','technician','engineer fte'] },
  { fa: 'Conferences and Meetings', kw: ['conference','training','workshop','event','meeting','travel','seminar','offsite'] },
  { fa: 'Personnel Expenses', kw: ['recruiting','recruitment','onboarding','relocation','reimbursement'] },
  { fa: 'Depreciation', kw: ['depreciation','amortization'] }
];
function suggestFA190(itemName) {
  const n = String(itemName || '').toLowerCase();
  for (const { fa, kw } of FA190_KEYWORDS) {
    if (kw.some(k => n.includes(k))) return fa;
  }
  return null;
}

function setProjLink(pi, ii, val) {
  const it = projs[pi].items[ii];
  if (!val) {
    if (it.linkedTo) {
      logAudit('project_link', `Unlinked "${projs[pi].n} › ${it.n}"`);
      delete it.linkedTo;
    }
  } else {
    const [ci, si] = val.split('.').map(Number);
    if (!cats[ci] || !cats[ci].subs[si]) return;
    it.linkedTo = { ci, si };
    logAudit('project_link', `Linked "${projs[pi].n} › ${it.n}" → "${cats[ci].n} › ${cats[ci].subs[si].n}"`);
  }
  ra();
}

// Lookup: find all project items linked to a given subcategory
function projectLinksForSub(ci, si) {
  const links = [];
  projs.forEach((p, pi) => {
    p.items.forEach((it, ii) => {
      if (it.linkedTo && it.linkedTo.ci === ci && it.linkedTo.si === si) {
        links.push({ proj: p.n, item: it.n, budget: it.b, actual: it.a || 0 });
      }
    });
  });
  return links;
}

// ============ FA 190 Rollup ============
function compTypeToFA190(type) {
  if (type === 'Benefits') return 'Employee Benefits';
  if (type === 'Salary' || type === 'Bonus' || type === 'Equity') return 'Compensation';
  return null;
}

function buildFA190Rollup() {
  const rollup = {};
  FA190_CATEGORIES.forEach(c => { rollup[c] = { budget: 0, actual: 0, priorActual: 0, lineCount: 0, sources: [] }; });
  const unassigned = [];
  const priorExists = !!fyStore.years[priorYearKey()];

  function applyToRollup(tags, srcInfo) {
    // tags is array of { fa, pct } summing to ~100
    tags.forEach(({ fa, pct }) => {
      if (!FA190_CATEGORIES.includes(fa)) return;
      const frac = pct / 100;
      rollup[fa].budget += srcInfo.budget * frac;
      rollup[fa].actual += srcInfo.actual * frac;
      rollup[fa].priorActual += srcInfo.priorActual * frac;
      rollup[fa].lineCount++;
      rollup[fa].sources.push({
        ...srcInfo,
        budget: srcInfo.budget * frac,
        actual: srcInfo.actual * frac,
        priorActual: srcInfo.priorActual * frac,
        splitPct: pct,
        isSplit: tags.length > 1
      });
    });
  }

  cats.forEach(cat => {
    cat.subs.forEach(sub => {
      sub.items.forEach(it => {
        const py = priorExists ? priorYearItemActual(it.n, sub.n, cat.n) : null;
        const srcInfo = {
          source: 'Budget planner',
          path: `${cat.n} › ${sub.n} › ${it.n}`,
          budget: it.b, actual: it.a || 0, priorActual: py || 0
        };
        // Determine tags
        let tags = null;
        if (Array.isArray(it.fa190Splits) && it.fa190Splits.length > 0) {
          tags = it.fa190Splits.filter(s => FA190_CATEGORIES.includes(s.fa) && s.pct > 0);
        } else if (it.fa190 && FA190_CATEGORIES.includes(it.fa190)) {
          tags = [{ fa: it.fa190, pct: 100 }];
        }
        if (!tags || tags.length === 0) {
          unassigned.push(srcInfo);
          return;
        }
        applyToRollup(tags, srcInfo);
      });
    });
  });

  compDepts.forEach(dept => {
    dept.employees.forEach(emp => {
      emp.items.forEach(item => {
        const tag = compTypeToFA190(item.type);
        let priorVal = 0;
        if (priorExists) {
          const prior = fyStore.years[priorYearKey()];
          const priorDept = prior.compDepts?.find(d => d.n === dept.n);
          const priorEmp = priorDept?.employees.find(e => e.n === emp.n);
          const priorItem = priorEmp?.items.find(i => i.n === item.n);
          if (priorItem) priorVal = priorItem.a || priorItem.b || 0;
        }
        const srcInfo = {
          source: 'Compensation',
          path: `${dept.n} › ${emp.n} › ${item.n}`,
          budget: item.b, actual: item.a || 0, priorActual: priorVal
        };
        if (!tag) {
          unassigned.push({...srcInfo, path: srcInfo.path + ` (${item.type || 'Other'})`});
          return;
        }
        applyToRollup([{ fa: tag, pct: 100 }], srcInfo);
      });
    });
  });

  return { byCategory: rollup, unassigned, priorExists };
}

function bulkTagFA190(ci, si, val) {
  if (!val) return;
  const sub = cats[ci].subs[si];
  let count = 0;
  sub.items.forEach(it => {
    if (val === '__CLEAR__') { delete it.fa190; delete it.fa190Splits; count++; }
    else if (val === '__SUGGEST__') {
      const s = suggestFA190(it.n);
      if (s) { it.fa190 = s; delete it.fa190Splits; count++; }
    } else {
      it.fa190 = val; delete it.fa190Splits;
      count++;
    }
  });
  const label = val === '__CLEAR__' ? 'cleared' : val === '__SUGGEST__' ? 'auto-suggested' : `tagged as "${val}"`;
  logAudit('fa190', `Bulk ${label} ${count} item(s) in "${cats[ci].n} › ${sub.n}"`);
  ra();
}

function bulkTagFA190Cat(ci, val) {
  if (!val) return;
  const cat = cats[ci];
  let count = 0, suggested = 0;
  cat.subs.forEach(sub => sub.items.forEach(it => {
    if (val === '__CLEAR__') { delete it.fa190; delete it.fa190Splits; count++; }
    else if (val === '__SUGGEST__') {
      const s = suggestFA190(it.n);
      if (s) { it.fa190 = s; delete it.fa190Splits; suggested++; }
      count++;
    } else {
      it.fa190 = val; delete it.fa190Splits;
      count++;
    }
  }));
  const label = val === '__CLEAR__' ? `cleared ${count} item(s)` :
                val === '__SUGGEST__' ? `auto-suggested ${suggested} of ${count} item(s)` :
                `tagged ${count} item(s) as "${val}"`;
  logAudit('fa190', `Bulk in "${cat.n}": ${label}`);
  ra();
}

function autoSuggestAllFA190() {
  let suggested = 0, total = 0;
  cats.forEach(cat => cat.subs.forEach(sub => sub.items.forEach(it => {
    if (!it.fa190) {
      const s = suggestFA190(it.n);
      if (s) { it.fa190 = s; suggested++; }
      total++;
    }
  })));
  alert(`Auto-suggested FA 190 categories for ${suggested} of ${total} unassigned items.\n\nReview the FA 190 tab to see results and adjust any incorrect assignments.`);
  logAudit('fa190', `Auto-suggested ${suggested}/${total} unassigned items`);
  ra();
}

function setLineItemFA190(ci, si, ii, val) {
  const item = cats[ci].subs[si].items[ii];
  if (val === '__SPLIT__') {
    // Build current splits string for display
    let current = '';
    if (Array.isArray(item.fa190Splits)) {
      current = item.fa190Splits.map(s => `${s.pct}% ${s.fa}`).join('\n');
    } else if (item.fa190) {
      current = `100% ${item.fa190}`;
    }
    const example = '70% Equipment\n30% Professional and Consulting';
    const input = prompt(
      `Split this item across multiple FA 190 categories.\n\n` +
      `Enter one allocation per line as: PERCENT% CATEGORY\n` +
      `Percentages must sum to 100.\n\n` +
      `Categories: ${FA190_CATEGORIES.join(', ')}\n\n` +
      `Example:\n${example}\n\n` +
      `(Leave blank to clear split and unassign)`,
      current || example
    );
    if (input === null) { ra(); return; }
    if (!input.trim()) {
      delete item.fa190Splits; delete item.fa190;
      logAudit('fa190', `Cleared FA 190 on "${item.n}"`);
      return;
    }
    const lines = input.split('\n').map(l => l.trim()).filter(l => l);
    const splits = [];
    for (const line of lines) {
      const m = line.match(/^(\d+(?:\.\d+)?)\s*%?\s+(.+)$/);
      if (!m) { alert(`Couldn't parse: "${line}"\nExpected format: 70% Equipment`); return; }
      const pct = parseFloat(m[1]);
      const fa = m[2].trim();
      const matchedFA = FA190_CATEGORIES.find(c => c.toLowerCase() === fa.toLowerCase());
      if (!matchedFA) { alert(`Unknown FA 190 category: "${fa}"\n\nMust be one of:\n${FA190_CATEGORIES.join('\n')}`); return; }
      splits.push({ fa: matchedFA, pct });
    }
    const total = splits.reduce((s, x) => s + x.pct, 0);
    if (Math.abs(total - 100) > 0.5) {
      if (!confirm(`Splits sum to ${total}%, not 100%. Save anyway?`)) return;
    }
    if (splits.length === 1) {
      // single-line "split" reduces to plain assignment
      item.fa190 = splits[0].fa; delete item.fa190Splits;
    } else {
      item.fa190Splits = splits; delete item.fa190;
    }
    logAudit('fa190', `Set split on "${item.n}": ${splits.map(s => `${s.pct}% ${s.fa}`).join(', ')}`);
  } else if (val === '') {
    delete item.fa190; delete item.fa190Splits;
  } else {
    item.fa190 = val; delete item.fa190Splits;
  }
}

function getState() { return { fyStore, auditLog }; }

function bindCurrentYear() {
  const y = fyStore.years[fyStore.currentFY];

  cats.length = 0; y.cats.forEach(c => cats.push(c));
  compDepts.length = 0; y.compDepts.forEach(d => compDepts.push(d));

  fyStore.years[fyStore.currentFY] = {

    compDepts: JSON.parse(JSON.stringify(compDepts)),

function applyState(state) {
  if (state.fyStore) { fyStore = state.fyStore; bindCurrentYear(); }
  else if (state.cats) {
    // legacy v1 format — migrate
    fyStore.years[fyStore.currentFY] = {
      cats: state.cats, compDepts: state.compDepts || [], projs: state.projs || []

// ============ Session passphrase state ============
// Passphrase lives in memory by default. If user opts into "remember for this session",
// it's also stored in sessionStorage (cleared when the tab/browser closes).
let sessionPassphrase = null;
const SESSION_PASS_KEY = 'it_budget_session_pass';

function getActivePassphrase() {
  if (sessionPassphrase) return sessionPassphrase;
  try {
    const remembered = sessionStorage.getItem(SESSION_PASS_KEY);
    if (remembered) { sessionPassphrase = remembered; return remembered; }
  } catch(e) {}
  return null;
}

function rememberPassphraseForSession(pass) {
  sessionPassphrase = pass;
  try { sessionStorage.setItem(SESSION_PASS_KEY, pass); } catch(e) {}
}

function forgetSessionPassphrase() {
  sessionPassphrase = null;
  try { sessionStorage.removeItem(SESSION_PASS_KEY); } catch(e) {}
}

async function saveToStorage(shouldSync = true) {
  try {
    if (shouldSync) syncCurrentYear();
    const state = { fyStore, auditLog };
    let toStore;
    const pass = getActivePassphrase();
    if (pass) {
      const envelope = await encryptJSON(state, pass);
      envelope.encryptedStore = true;
      toStore = JSON.stringify(envelope);
    } else {
      toStore = JSON.stringify(state);
    }
    localStorage.setItem(STORAGE_KEY, toStore);
    const now = new Date();
    const el = document.getElementById('save-status');
    if (el) el.textContent = (pass ? '🔒 Saved ' : 'Saved ') + now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    if (typeof scheduleAutoPush === 'function') scheduleAutoPush();
  } catch(e) {
    console.error('Save failed:', e);
    const el = document.getElementById('save-status');
    if (el) el.textContent = 'Save failed';
  }
}

// Returns 'loaded' | 'locked' | 'empty'
// 'locked' means an encrypted store exists but we need a passphrase
async function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.format === ENC_FORMAT) {
        // Encrypted — need passphrase
        const pass = getActivePassphrase();
        if (!pass) return 'locked';
        try {
          const state = await decryptJSON(parsed, pass);
          applyState(state);
          return 'loaded';
        } catch (err) {
          forgetSessionPassphrase();
          return 'locked';
        }
      } else {
        applyState(parsed);
        return 'loaded';
      }
    }
    const legacy = localStorage.getItem(LEGACY_KEY);
    if (legacy) { applyState(JSON.parse(legacy)); return 'loaded'; }
  } catch(e) { console.error('Load failed:', e); }
  return 'empty';
}

function isStoreEncrypted() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const parsed = JSON.parse(raw);
    return parsed && parsed.format === ENC_FORMAT;
  } catch(e) { return false; }
}

// ============ Encryption helpers (WebCrypto, AES-GCM + PBKDF2) ============
// Format for encrypted files: { format: "itbudget-encrypted-v1", salt, iv, ciphertext } (all base64)

const ENC_FORMAT = 'itbudget-encrypted-v1';

function bufToB64(buf) {
  const bytes = new Uint8Array(buf);
  let s = '';
  for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
  return btoa(s);
}
function b64ToBuf(b64) {
  const s = atob(b64);
  const bytes = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
  return bytes.buffer;
}
async function deriveKey(passphrase, saltBuf) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    'raw', enc.encode(passphrase), { name: 'PBKDF2' }, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: saltBuf, iterations: 250000, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}
async function encryptJSON(obj, passphrase) {
  const plaintext = new TextEncoder().encode(JSON.stringify(obj));
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(passphrase, salt);
  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, plaintext);
  return {
    format: ENC_FORMAT,
    created: new Date().toISOString(),
    salt: bufToB64(salt),
    iv: bufToB64(iv),
    ciphertext: bufToB64(ciphertext)
  };
}
async function decryptJSON(envelope, passphrase) {
  if (envelope.format !== ENC_FORMAT) throw new Error('Unknown encryption format');
  const salt = b64ToBuf(envelope.salt);
  const iv = b64ToBuf(envelope.iv);
  const ciphertext = b64ToBuf(envelope.ciphertext);
  const key = await deriveKey(passphrase, salt);
  const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return JSON.parse(new TextDecoder().decode(plaintext));
}

async function submitLock(mode) {
  const pass = document.getElementById('lock-pass').value;
  const remember = document.getElementById('lock-remember').checked;
  const errEl = document.getElementById('lock-error');
  errEl.textContent = '';

  if (mode === 'setup') {
    const pass2 = document.getElementById('lock-pass2').value;
    if (!pass || pass.length < 8) { errEl.textContent = 'Passphrase must be at least 8 characters.'; return; }
    if (pass !== pass2) { errEl.textContent = 'Passphrases do not match.'; return; }
    sessionPassphrase = pass;
    if (remember) rememberPassphraseForSession(pass);
    await saveToStorage(false);
    logAudit('security', 'Passphrase protection enabled');
    hideLockScreen();
    ra();
    document.getElementById('save-status').textContent = '🔒 Protected ✓';
    return;
  }

  // unlock mode
  if (!pass) { errEl.textContent = 'Enter your passphrase.'; return; }
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const envelope = JSON.parse(raw);
    const state = await decryptJSON(envelope, pass);
    applyState(state);
    sessionPassphrase = pass;
    if (remember) rememberPassphraseForSession(pass);
    hideLockScreen();
    refreshFYSelect();
    ra();

// ============ GitHub Gist Sync ============
const GIST_TOKEN_KEY = 'itbudget_gist_token';
const GIST_ID_KEY = 'itbudget_gist_id';
const GIST_FILENAME_KEY = 'itbudget_gist_filename';
const GIST_AUTOPUSH_KEY = 'itbudget_gist_autopush';
const GIST_LASTSYNC_KEY = 'itbudget_gist_lastsync';
const GIST_DEFAULT_FILENAME = 'it_budget_data.json';

function getGistConfig() {
  return {
    token: localStorage.getItem(GIST_TOKEN_KEY) || '',
    gistId: localStorage.getItem(GIST_ID_KEY) || '',
    filename: localStorage.getItem(GIST_FILENAME_KEY) || GIST_DEFAULT_FILENAME,
    autopush: localStorage.getItem(GIST_AUTOPUSH_KEY) === '1',
    lastSync: localStorage.getItem(GIST_LASTSYNC_KEY) || ''
  };
}

function saveGistConfig(cfg) {
  if (cfg.token !== undefined) localStorage.setItem(GIST_TOKEN_KEY, cfg.token);
  if (cfg.gistId !== undefined) localStorage.setItem(GIST_ID_KEY, cfg.gistId);
  if (cfg.filename !== undefined) localStorage.setItem(GIST_FILENAME_KEY, cfg.filename);
  if (cfg.autopush !== undefined) localStorage.setItem(GIST_AUTOPUSH_KEY, cfg.autopush ? '1' : '0');
  if (cfg.lastSync !== undefined) localStorage.setItem(GIST_LASTSYNC_KEY, cfg.lastSync);
}

function clearGistConfig() {
  [GIST_TOKEN_KEY, GIST_ID_KEY, GIST_FILENAME_KEY, GIST_AUTOPUSH_KEY, GIST_LASTSYNC_KEY].forEach(k => localStorage.removeItem(k));
}

async function githubFetch(path, opts = {}) {
  const cfg = getGistConfig();
  if (!cfg.token) throw new Error('No GitHub token configured');
  const res = await fetch('https://api.github.com' + path, {
    ...opts,
    headers: {
      'Accept': 'application/vnd.github+json',
      'Authorization': 'token ' + cfg.token,
      'X-GitHub-Api-Version': '2022-11-28',
      'Content-Type': 'application/json',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) {
    const text = await res.text();
    let msg = `GitHub API ${res.status}`;
    try { const j = JSON.parse(text); if (j.message) msg += ': ' + j.message; } catch(e) {}
    throw new Error(msg);
  }
  return res.json();
}

async function createNewGist() {
  const cfg = getGistConfig();
  if (!cfg.token) throw new Error('Token required');
  // Build initial content (encrypted envelope if passphrase is set, otherwise plain)
  syncCurrentYear();
  const state = { fyStore, auditLog };
  let content;
  const pass = getActivePassphrase();
  if (pass) {
    const envelope = await encryptJSON(state, pass);
    envelope.encryptedStore = true;
    content = JSON.stringify(envelope, null, 2);
  } else {
    content = JSON.stringify(state, null, 2);
  }
  const gist = await githubFetch('/gists', {
    method: 'POST',
    body: JSON.stringify({
      description: 'IT Budget Dashboard — private sync',
      public: false,
      files: { [cfg.filename]: { content } }
    })
  });
  saveGistConfig({ gistId: gist.id, lastSync: new Date().toISOString() });
  return gist;
}

async function pushToGist() {
  const cfg = getGistConfig();
  if (!cfg.token) throw new Error('Token required — configure sync first');
  if (!cfg.gistId) throw new Error('Gist ID required — configure sync first');
  syncCurrentYear();
  const state = { fyStore, auditLog };
  let content;
  const pass = getActivePassphrase();
  if (pass) {
    const envelope = await encryptJSON(state, pass);
    envelope.encryptedStore = true;
    content = JSON.stringify(envelope, null, 2);
  } else {
    content = JSON.stringify(state, null, 2);
  }
  await githubFetch('/gists/' + cfg.gistId, {
    method: 'PATCH',
    body: JSON.stringify({
      files: { [cfg.filename]: { content } }
    })
  });
  saveGistConfig({ lastSync: new Date().toISOString() });
  logAudit('sync', `Pushed to Gist ${cfg.gistId.slice(0,8)}…`);
}

async function pullFromGist() {
  const cfg = getGistConfig();
  if (!cfg.token) throw new Error('Token required — configure sync first');
  if (!cfg.gistId) throw new Error('Gist ID required — configure sync first');
  const gist = await githubFetch('/gists/' + cfg.gistId);
  const file = gist.files[cfg.filename];
  if (!file) throw new Error(`File "${cfg.filename}" not found in Gist. Available: ${Object.keys(gist.files).join(', ')}`);
  let content = file.content;
  if (file.truncated && file.raw_url) {
    // Gists > 1MB get truncated; fetch raw
    const rawRes = await fetch(file.raw_url);
    if (!rawRes.ok) throw new Error('Failed to fetch full file contents');
    content = await rawRes.text();
  }
  const parsed = JSON.parse(content);
  let state;
  if (parsed && parsed.format === ENC_FORMAT) {
    const pass = getActivePassphrase();
    if (!pass) {
      // Prompt for it
      const inputPass = prompt('The synced data is encrypted. Enter passphrase to decrypt:');
      if (!inputPass) throw new Error('Passphrase required to read encrypted sync data');
      try {
        state = await decryptJSON(parsed, inputPass);
        sessionPassphrase = inputPass; // apply to session so save also encrypts
      } catch (e) {
        throw new Error('Could not decrypt: wrong passphrase or corrupted data');
      }
    } else {
      try {
        state = await decryptJSON(parsed, pass);
      } catch (e) {
        throw new Error('Could not decrypt synced data with current passphrase. The remote file may use a different passphrase.');
      }
    }
  } else {
    state = parsed;
  }
  applyState(state);
  await saveToStorage(false);
  refreshFYSelect();
  saveGistConfig({ lastSync: new Date().toISOString() });
  logAudit('sync', `Pulled from Gist ${cfg.gistId.slice(0,8)}…`);
}

async function doSyncSetup() {
  const errEl = document.getElementById('sync-setup-error');
  errEl.textContent = '';
  const token = document.getElementById('gist-token').value.trim();
  const mode = document.querySelector('input[name="gist-mode"]:checked')?.value || 'new';
  const gistId = document.getElementById('gist-id').value.trim();
  const filename = document.getElementById('gist-filename').value.trim() || GIST_DEFAULT_FILENAME;

  if (!token) { errEl.textContent = 'Token is required.'; return; }
  saveGistConfig({ token, filename });

  try {
    // Verify token first
    await githubFetch('/user');
    if (mode === 'existing') {
      if (!gistId) { errEl.textContent = 'Gist ID is required when using existing.'; return; }
      saveGistConfig({ gistId });
      // Try reading it to confirm access
      await githubFetch('/gists/' + gistId);
      logAudit('sync', `Connected to existing Gist ${gistId.slice(0,8)}…`);
    } else {
      const gist = await createNewGist();
      logAudit('sync', `Created new Gist ${gist.id.slice(0,8)}…`);
    }
    document.getElementById('sync-modal').remove();
    showSyncMenu();
  } catch (err) {
    errEl.textContent = err.message;
  }
}

function securityMenu() {
  const encrypted = isStoreEncrypted();
  const unlocked = !!getActivePassphrase();
  const choice = prompt(
    'Security options\n\n' +
    `Current status: ${encrypted ? (unlocked ? '🔒 Encrypted, unlocked' : '🔒 Encrypted, locked') : 'Not encrypted'}\n\n` +
    'Type one of:\n' +
    (encrypted
      ? '  lock     — lock the dashboard now (requires passphrase to reopen)\n' +
        '  change   — change your passphrase\n' +
        '  remove   — remove passphrase protection (makes data plaintext)\n' +
        '  forget   — forget "remember for session" (still encrypted, just re-prompts)'
      : '  setup    — enable passphrase protection') +
    '\n\n  cancel   — close this menu',
    encrypted ? 'lock' : 'setup'
  );
  if (!choice) return;
  const cmd = choice.toLowerCase().trim();
  if (cmd === 'cancel') return;
  if (cmd === 'setup' && !encrypted) showLockScreen('setup');
  else if (cmd === 'lock' && encrypted) lockNow();
  else if (cmd === 'change' && encrypted) changePassphrase();
  else if (cmd === 'remove' && encrypted) removePassphrase();
  else if (cmd === 'forget' && encrypted) {
    try { sessionStorage.removeItem(SESSION_PASS_KEY); } catch(e) {}
    alert('Session passphrase forgotten. You will be prompted on next load.');
  } else {
    alert('Unknown option.');
  }
}

function lockNow() {

async function changePassphrase() {
  if (!isStoreEncrypted()) {
    alert('No passphrase is currently set. Use the 🔒 Lock button to enable passphrase protection.');
    return;
  }
  const pass = getActivePassphrase();
  if (!pass) { alert('You must be unlocked to change your passphrase.'); return; }
  const newPass = prompt('Enter NEW passphrase (minimum 8 characters):');
  if (!newPass) return;
  if (newPass.length < 8) { alert('Passphrase must be at least 8 characters.'); return; }
  const confirmNew = prompt('Confirm new passphrase:');
  if (newPass !== confirmNew) { alert('Passphrases do not match.'); return; }
  sessionPassphrase = newPass;
  // Update session storage if it was set
  try {
    if (sessionStorage.getItem(SESSION_PASS_KEY)) rememberPassphraseForSession(newPass);
  } catch(e) {}
  await saveToStorage(false);
  logAudit('security', 'Passphrase changed');
  alert('Passphrase updated ✓');
}

async function removePassphrase() {
  if (!isStoreEncrypted()) { alert('No passphrase is currently set.'); return; }
  if (!confirm('Remove passphrase protection?\n\nYour data will be stored unencrypted in this browser. Anyone with access to this browser profile will be able to read it.')) return;
  // Force re-save unencrypted by clearing the passphrase and calling saveToStorage
  forgetSessionPassphrase();
  await saveToStorage(false);
  logAudit('security', 'Passphrase protection removed');
  alert('Passphrase removed. Data is now unencrypted.');
  document.getElementById('save-status').textContent = 'Passphrase removed';
}

}

      e.items.forEach(i => {
        lines.push([
          csvEsc(d.n), csvEsc(e.n), csvEsc(e.title), csvEsc(i.n), i.type,
          i.b, i.a || 0, i.b - (i.a || 0)
        ].join(','));
      });
    });
  });
  lines.push('');
  lines.push('# Projects');
  lines.push('Project,Line Item,Type,Budget,Actual,Variance');
  projs.forEach(p => {
    p.items.forEach(i => {
      lines.push([csvEsc(p.n), csvEsc(i.n), i.t, i.b, i.a || 0, i.b - (i.a || 0)].join(','));
    });
  });
  const blob = new Blob([lines.join('\n')], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'it_budget_FY' + fyStore.currentFY + '_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  document.getElementById('save-status').textContent = 'CSV exported ✓';
}
function csvEsc(s) {
  s = String(s || '');
  if (s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

// CSV line parser that respects quoted fields
function parseCSVLine(line) {
  const out = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQ = false;
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { out.push(cur); cur = ''; }
      else cur += c;
    }
  }
  out.push(cur);
  return out.map(s => s.trim());
}

function parseNum(s) {
  if (s === undefined || s === null || s === '') return 0;
  const n = Number(String(s).replace(/[$,\s]/g, ''));
  return isNaN(n) ? 0 : n;
}

function importCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const text = ev.target.result;
      const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
      if (lines.length < 2) { alert('CSV appears empty or has no data rows.'); return; }

      // Detect sectioned format (from our own Export CSV) vs flat format
      let section = 'planner';
      let headerSeen = false;
      let headerMap = {};
      const parsed = { planner: [], compensation: [], projects: [] };

      for (let raw of lines) {
        const trimmed = raw.trim();
        if (!trimmed) continue;
        // Title line "IT Budget — FY 2025" — skip
        if (trimmed.startsWith('IT Budget')) continue;
        // Section header lines
        if (/^#\s*Budget Planner/i.test(trimmed)) { section = 'planner'; headerSeen = false; continue; }
        if (/^#\s*Compensation/i.test(trimmed)) { section = 'compensation'; headerSeen = false; continue; }
        if (/^#\s*Projects?/i.test(trimmed)) { section = 'projects'; headerSeen = false; continue; }

        const fields = parseCSVLine(raw);
        if (!headerSeen) {
          // Treat first non-blank row in a section as a header
          headerMap = {};
          fields.forEach((h, i) => { headerMap[h.toLowerCase().trim()] = i; });
          headerSeen = true;
          continue;
        }
        parsed[section].push({ fields, headerMap: { ...headerMap } });
      }

      if (parsed.planner.length === 0 && parsed.compensation.length === 0 && parsed.projects.length === 0) {
        alert('No data rows found. Expected at least a Budget Planner section with Category, Subcategory, Line Item, Budget, Actual columns.');
        return;
      }

      // Build preview counts
      const preview = [
        `Planner rows: ${parsed.planner.length}`,
        `Compensation rows: ${parsed.compensation.length}`,
        `Project rows: ${parsed.projects.length}`
      ].join('\n');

      const choice = prompt(
        `CSV preview:\n${preview}\n\nHow should this import be applied to FY ${fyStore.currentFY}?\n` +
        `  replace  — overwrite all data in current FY\n` +
        `  merge    — update matching line items, add new ones\n` +
        `  cancel   — abort\n\nType one of: replace, merge, cancel`,
        'merge'
      );
      if (!choice || choice.toLowerCase() === 'cancel') return;
      const mode = choice.toLowerCase();
      if (mode !== 'replace' && mode !== 'merge') {
        alert('Unknown option. Import cancelled.');
        return;
      }

      if (mode === 'replace') {
        cats.length = 0;
        compDepts.length = 0;
        projs.length = 0;
      }

      // ==== Import Budget Planner rows ====
      let addedItems = 0, updatedItems = 0, addedCats = 0;
      parsed.planner.forEach(row => {
        const h = row.headerMap, f = row.fields;
        const catName = f[h['category']];
        const subName = f[h['subcategory']] || 'General';
        const itemName = f[h['line item']] || f[h['line_item']] || f[h['item']];
        const faName = f[h['fa 190']] || f[h['fa190']] || '';
        const budget = parseNum(f[h['budget']]);
        const actual = parseNum(f[h['actual']]);
        if (!catName || !itemName) return;

        let cat = cats.find(c => c.n === catName);
        if (!cat) {
          const color = CAT_PALETTE[cats.length % CAT_PALETTE.length];
          cat = { n: catName, c: color, open: false, subs: [] };
          cats.push(cat);
          addedCats++;
        }
        let sub = cat.subs.find(s => s.n === subName);
        if (!sub) { sub = { n: subName, open: false, items: [] }; cat.subs.push(sub); }
        let item = sub.items.find(i => i.n === itemName);
        const validFA = (faName && FA190_CATEGORIES.includes(faName)) ? faName : undefined;
        if (item) {
          item.b = budget; item.a = actual;
          if (validFA) item.fa190 = validFA;
          updatedItems++;
        } else {
          const newItem = { n: itemName, b: budget, a: actual };
          if (validFA) newItem.fa190 = validFA;
          sub.items.push(newItem);
          addedItems++;
        }
      });

      // ==== Import Compensation rows ====
      let addedEmp = 0, updatedComp = 0;
      parsed.compensation.forEach(row => {
        const h = row.headerMap, f = row.fields;
        const deptName = f[h['department']];
        const empName = f[h['employee']];
        const title = f[h['title']] || '';
        const compName = f[h['component']] || 'Base Salary';
        const type = f[h['type']] || 'Salary';
        const budget = parseNum(f[h['budget']]);
        const actual = parseNum(f[h['actual']]);
        if (!deptName || !empName) return;

        let dept = compDepts.find(d => d.n === deptName);
        if (!dept) {
          const color = CAT_PALETTE[compDepts.length % CAT_PALETTE.length];
          dept = { n: deptName, c: color, open: false, employees: [] };
          compDepts.push(dept);
        }
        let emp = dept.employees.find(e => e.n === empName);
        if (!emp) {
          emp = { n: empName, title: title, open: false, items: [] };
          dept.employees.push(emp);
          addedEmp++;
        } else if (title && !emp.title) emp.title = title;

        let item = emp.items.find(i => i.n === compName);
        if (item) { item.b = budget; item.a = actual; item.type = type; updatedComp++; }
        else { emp.items.push({ n: compName, type: type, b: budget, a: actual }); updatedComp++; }
      });

      // ==== Import Project rows ====
      let projChanges = 0;
      parsed.projects.forEach(row => {
        const h = row.headerMap, f = row.fields;
        const projName = f[h['project']];
        const itemName = f[h['line item']] || f[h['line_item']] || f[h['item']];
        const type = f[h['type']] || 'Labor';
        const budget = parseNum(f[h['budget']]);
        const actual = parseNum(f[h['actual']]);
        if (!projName || !itemName) return;

        let proj = projs.find(p => p.n === projName);
        if (!proj) { proj = { n: projName, open: false, items: [] }; projs.push(proj); }
        let item = proj.items.find(i => i.n === itemName);
        if (item) { item.b = budget; item.a = actual; item.t = type; }
        else { proj.items.push({ n: itemName, t: type, b: budget, a: actual }); }
        projChanges++;
      });

      const summary = [];
      if (addedCats || addedItems || updatedItems) summary.push(`Planner: +${addedCats} categories, +${addedItems} items, ${updatedItems} updated`);
      if (addedEmp || updatedComp) summary.push(`Compensation: +${addedEmp} employees, ${updatedComp} component rows`);
      if (projChanges) summary.push(`Projects: ${projChanges} rows processed`);

      logAudit('csv_import', `CSV ${mode}: ${file.name} — ` + (summary.join(' · ') || 'no changes'));
      allocChart = null;
      saveToStorage();
      ra();
      document.getElementById('save-status').textContent = `Imported ${file.name} ✓`;
      alert('Import complete:\n\n' + (summary.join('\n') || 'No changes applied.'));
    } catch (err) {
      console.error(err);
      alert('Could not parse CSV. Error: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      let state;
      if (parsed && parsed.format === ENC_FORMAT) {
        // Encrypted — prompt for passphrase (up to 3 attempts)
        let decrypted = null;
        for (let attempt = 1; attempt <= 3; attempt++) {
          const pass = prompt(
            attempt === 1
              ? `"${file.name}" is encrypted. Enter the passphrase:`
              : `Incorrect passphrase. Attempt ${attempt} of 3:`
          );
          if (!pass) {
            document.getElementById('save-status').textContent = 'Import cancelled';
            return;
          }
          try {
            decrypted = await decryptJSON(parsed, pass);
            break;
          } catch (err) {
            if (attempt === 3) {
              alert('Decryption failed after 3 attempts. The passphrase is incorrect or the file is corrupted.');
              document.getElementById('save-status').textContent = 'Import failed';
              return;
            }
          }
        }
        state = decrypted;
      } else {
        state = parsed;
      }
      applyState(state);
      saveToStorage(false);
      refreshFYSelect();
      ra();
      const label = parsed.format === ENC_FORMAT ? 'encrypted ' : '';
      document.getElementById('save-status').textContent = `Imported ${label}${file.name}`;
      logAudit('import', `Imported ${label}JSON: ${file.name}`);
    } catch(err) {
      alert('Could not read file. Make sure it is a valid IT Budget JSON export.\n\nError: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function resetData() {
  if (!confirm('Reset ALL data (all fiscal years, all tabs, history) to defaults? This cannot be undone.')) return;
  fyStore = {
    currentFY: '2025',
    years: {
      '2025': {
        cats: JSON.parse(JSON.stringify(DEFAULT_CATS)),
        compDepts: JSON.parse(JSON.stringify(DEFAULT_COMP)),
        projs: JSON.parse(JSON.stringify(DEFAULT_PROJS))
      }
    }
  };
  auditLog = [];
  bindCurrentYear();
  saveToStorage(false);
  refreshFYSelect();
  ra();
  document.getElementById('save-status').textContent = 'Reset to defaults';
}

function showAuditLog() {
  const existing = document.getElementById('audit-modal');
  if (existing) { existing.remove(); return; }
  const overlay = document.createElement('div');
  overlay.id = 'audit-modal';
  overlay.className = 'modal-bg';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  const entries = auditLog.length === 0
    ? '<p style="color:var(--color-text-secondary);font-size:13px">No changes recorded yet. Edits are logged as you make them.</p>'
    : auditLog.slice(0, 100).map(a => `
      <div class="audit-row">
        <div class="audit-time">${new Date(a.ts).toLocaleString()} · FY ${a.fy} · ${a.cat}</div>
        <div class="audit-change">${a.msg}${a.old !== undefined && a.new !== undefined ? ` — <span class="audit-old">${typeof a.old === 'number' ? '$' + a.old.toLocaleString() : a.old}</span> → <span class="audit-new">${typeof a.new === 'number' ? '$' + a.new.toLocaleString() : a.new}</span>` : ''}</div>
      </div>`).join('');
  overlay.innerHTML = `<div class="modal-box">
    <div class="modal-head">
      <h3>Change history</h3>
      <div style="display:flex;gap:8px">
        <button class="tbtn2" onclick="clearAuditLog()">Clear log</button>
        <button class="close-btn" onclick="document.getElementById('audit-modal').remove()">✕</button>
      </div>
    </div>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:1rem">
      ${auditLog.length} total entries · showing most recent 100
    </div>
    ${entries}
  </div>`;
  document.body.appendChild(overlay);
}
function clearAuditLog() {
  if (!confirm('Clear all audit history? This cannot be undone.')) return;
  auditLog = [];
  saveToStorage(false);
  document.getElementById('audit-modal')?.remove();
  showAuditLog();
}

function printReport() {
  // Render all tabs before printing
  rPlan(); rAct(); rComp(); rProj(); rFA190();
  document.querySelectorAll('[id^="s-"]').forEach(el => el.style.display = 'block');
  document.querySelector('h2').setAttribute('data-fy', fyStore.currentFY);
  setTimeout(() => {
    window.print();
    setTimeout(() => {
      const active = document.querySelector('.tab.on')?.textContent?.trim().toLowerCase() || '';
      ['plan','act','comp','proj','fa'].forEach(id => {
        const map = {plan:'planner',act:'actuals',comp:'comp',proj:'project',fa:'fa 190'};
        document.getElementById('s-'+id).style.display = active.includes(map[id]) ? 'block' : 'none';
      });
    }, 500);
  }, 100);
}

// Track field edits for audit log
const pendingEdits = {};
function trackEdit(path, newVal, label) {
  if (pendingEdits[path] === undefined) pendingEdits[path] = newVal;
  clearTimeout(pendingEdits['__t_'+path]);
  pendingEdits['__t_'+path] = setTimeout(() => {
    const startVal = pendingEdits[path];
    if (startVal !== newVal) {
      logAudit('edit', label, startVal, newVal);
    }
    delete pendingEdits[path];
    delete pendingEdits['__t_'+path];
  }, 1500);
}

// Keyboard shortcuts: Tab moves between numeric cells, Enter adds a line item when focused on an existing item
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement?.tagName === 'INPUT') {
    const inp = document.activeElement;
    if (inp.type === 'number' || inp.type === 'text') {
      e.preventDefault();
      const all = Array.from(document.querySelectorAll('input[type=number], input[type=text]'));
      const idx = all.indexOf(inp);
      if (idx >= 0 && idx < all.length - 1) all[idx + 1].focus();
    }
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    saveToStorage();
    document.getElementById('save-status').textContent = 'Saved manually ✓';
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'p' && e.shiftKey) {
    e.preventDefault();
    printReport();
  }
});

// Wrap ra() to auto-save
function ra() {
  mx();
  const t = document.querySelector('.tab.on')?.textContent?.trim().toLowerCase() || '';
  if (t.includes('planner')) rPlan();
  else if (t.includes('actuals')) rAct();
  else if (t.includes('comp')) rComp();
  else if (t.includes('project')) rProj();
  else if (t.includes('fa 190')) rFA190();
  saveToStorage();
}

// Live update during typing — no full re-render (preserves input focus)
// Only refreshes metric cards + donut chart + saves state
let _raSaveTimer = null;
function raLive() {
  mx();
  if (typeof renderDonut === 'function' && allocChart) renderDonut();
  clearTimeout(_raSaveTimer);
  _raSaveTimer = setTimeout(() => saveToStorage(), 600);
}

(async function init() {
  const status = await loadFromStorage();
  refreshFYSelect();
  if (status === 'locked') {
    showLockScreen('unlock');
    return;
  }
  mx(); rPlan();
})();

let allocChart = null;
let fa190Chart = null;

function renderFA190Chart() {
  const canvas = document.getElementById('fa190Chart');
  if (!canvas) return;
  if (typeof Chart === 'undefined') return;
  const { byCategory, priorExists } = buildFA190Rollup();
  const usedCats = FA190_CATEGORIES.filter(c => byCategory[c].lineCount > 0);
  if (usedCats.length === 0) return;
  const labels = usedCats;
  const budgetData = usedCats.map(c => byCategory[c].budget);
  const actualData = usedCats.map(c => byCategory[c].actual);
  const colors = usedCats.map(c => FA190_COLORS[c]);
  if (fa190Chart) { fa190Chart.destroy(); fa190Chart = null; }
  fa190Chart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Budget', data: budgetData, backgroundColor: colors.map(c => c + '70'), borderColor: colors, borderWidth: 1 },
        { label: 'Actual', data: actualData, backgroundColor: colors, borderWidth: 0 }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'top',
          labels: { boxWidth: 10, boxHeight: 10, font: { size: 11 } }
        },
        tooltip: { callbacks: { label: c => ` ${c.dataset.label}: $${Math.round(c.raw).toLocaleString()}` } }
      },
      scales: {
        x: { ticks: { callback: v => '$' + (Math.abs(v) >= 1e6 ? (v/1e6).toFixed(1)+'M' : (v/1000).toFixed(0)+'K'), font: { size: 11 } } },
        y: { ticks: { font: { size: 11 } } }
      }
    }
  });
}

function renderDonut() {
  const canvas = document.getElementById('allocChart');
  if (!canvas) return;
  if (typeof Chart === 'undefined') return; // Chart.js not yet loaded
  const tb = gB();
  const data = cats.map(c => cB(c));
  const labels = cats.map(c => c.n);
  const colors = cats.map(c => c.c);
  if (allocChart) {
    allocChart.data.datasets[0].data = data;
    allocChart.data.labels = labels;
    allocChart.update();
  } else {
    allocChart = new Chart(canvas, {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: 'transparent' }] },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '62%',
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => ` ${c.label}: $${Math.round(c.raw).toLocaleString()} (${Math.round(c.raw/tb*100)}%)` } }
        }
      }
    });
  }
  const legend = document.getElementById('alloc-legend');
  if (legend) {
    legend.innerHTML = cats.map((c) =>
      `<span style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary)">
        <span style="width:10px;height:10px;border-radius:2px;background:${c.c};flex-shrink:0"></span>${c.n}
        <span style="color:var(--color-text-primary);font-weight:500">${Math.round(cB(c)/tb*100)}%</span>
      </span>`
    ).join('');
  }
}

// Load Chart.js dynamically, then render
(function() {
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';
  s.onload = () => {
    if (document.getElementById('allocChart')) renderDonut();
    if (document.getElementById('fa190Chart')) renderFA190Chart();
  };
  document.head.appendChild(s);
})();
</script>
